# OpenSphere Console (Angular + ng-clarity 셸 PoC) — ADR-UI-001 T2 스파이크
# 소스: https://dev.azure.com/OpenSphere-Platform/OpenSphere-Platform/_git/opensphere-console
# 이미지: 자체 빌드 → 클러스터 노드 반입 후 digest 핀 (이미지 규약)
# 선행: Secret shell-tls, Secret opensphere-console-auth-ca — git에 값 없음
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensphere-console
  namespace: opensphere-console
  labels: { app: opensphere-console }
spec:
  replicas: 2
  selector:
    matchLabels: { app: opensphere-console }
  template:
    metadata:
      annotations:
        opensphere.io/manual-ui-contract: console-help-center-v2
      labels: { app: opensphere-console }
    spec:
      imagePullSecrets: [{ name: opensphere-ghcr-pull }]
      containers:
        - name: shell
          # 정본(릴리스): GHCR 이미지(NAMING-STANDARD §1·§4). 로컬 kind는 로컬 태그로 override(kubectl set image / overlay, §5).
          # push 후 §6 BOM에서 ghcr.io/opensphere-platform/opensphere-console@sha256:<digest>로 고정.
          image: ghcr.io/opensphere-platform/opensphere-console:2.0.0-rc.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # CSP connect-src/frame-src에 허용할 콘솔 OIDC origin (브라우저 기준 주소)
            - name: OS_AUTH_ORIGIN
              value: "__OPENSPHERE_CONSOLE_URL__"
          volumeMounts:
            # nginx ssl_certificate 로드용 self-signed TLS (로컬-only; HTTPS 셸이 기동 시 인증서 필수)
            - name: nginx-certs
              mountPath: /etc/nginx/certs
              readOnly: true
            - name: upstream-auth-ca
              mountPath: /etc/nginx/upstream-ca
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  grep -q '"contract": "console-help-center-v2"' /usr/share/nginx/html/manual-contract.json &&
                  grep -Rqs 'console-help-center-v2' /usr/share/nginx/html/main-*.js &&
                  ! grep -Rqs 'os-source-chips' /usr/share/nginx/html/main-*.js
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /index.html, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: nginx-certs
          secret:
            secretName: shell-tls
        - name: upstream-auth-ca
          secret:
            secretName: opensphere-console-auth-ca
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-console-ext
  namespace: opensphere-console
spec:
  # docker-desktop: LoadBalancer가 localhost:8090에 바인딩
  type: LoadBalancer
  selector: { app: opensphere-console }
  ports:
    - name: https
      port: 8090
      targetPort: 8443
