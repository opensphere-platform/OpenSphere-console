# OpenSphere Console (Angular + ng-clarity 셸 PoC) — ADR-UI-001 T2 스파이크
# 소스: https://dev.azure.com/OpenSphere-Platform/OpenSphere-Platform/_git/opensphere-console
# 이미지: 자체 빌드 → 클러스터 노드 반입 후 digest 핀 (이미지 규약)
# 선행: Secret shell-tls, Secret opensphere-console-auth-ca — git에 값 없음
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensphere-console
  namespace: opensphere-console
  labels: { app: opensphere-console }
spec:
  replicas: 2
  selector:
    matchLabels: { app: opensphere-console }
  template:
    metadata:
      labels: { app: opensphere-console }
    spec:
      containers:
        - name: shell
          # ⚠️TODO: opensphere-console 이미지 빌드·push 필요 — 아래 digest는 구 opensphere-shell 아티팩트(opensphere-console repo엔 미존재).
          # 사람용 태그: ghcr.io/opensphere-platform/opensphere-console:0.8.1-reauth (비번변경 재인증)
          # 로컬 kind: 노드 로드 태그 참조(IfNotPresent). CI/레지스트리 배포는 @sha256 digest 고정.
          image: opensphere-console:roles-panel-20260712
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # CSP connect-src/frame-src에 허용할 콘솔 OIDC origin (브라우저 기준 주소)
            - name: OS_AUTH_ORIGIN
              value: "https://localhost:8444"
          volumeMounts:
            # nginx ssl_certificate 로드용 self-signed TLS (로컬-only; HTTPS 셸이 기동 시 인증서 필수)
            - name: nginx-certs
              mountPath: /etc/nginx/certs
              readOnly: true
            - name: upstream-auth-ca
              mountPath: /etc/nginx/upstream-ca
              readOnly: true
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /index.html, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: nginx-certs
          secret:
            secretName: shell-tls
        - name: upstream-auth-ca
          secret:
            secretName: opensphere-console-auth-ca
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-console-ext
  namespace: opensphere-console
spec:
  # docker-desktop: LoadBalancer가 localhost:8090에 바인딩
  type: LoadBalancer
  selector: { app: opensphere-console }
  ports:
    - name: https
      port: 8090
      targetPort: 8443
