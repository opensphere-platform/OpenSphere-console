# Temporary DNS bridge while legacy control-plane workloads are moved from
# opensphere-system / opensphere-console-auth to the canonical opensphere-console namespace.
# Remove each alias only after a same-named Service exists in opensphere-console.
apiVersion: v1
kind: Service
metadata: { name: opensphere-console-dupa-controller, namespace: opensphere-console }
spec:
  type: ExternalName
  externalName: dupa-registry-controller.opensphere-system.svc.cluster.local
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: opensphere-console-backend, namespace: opensphere-console }
spec:
  type: ExternalName
  externalName: console-backend.opensphere-system.svc.cluster.local
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: opensphere-console-auth, namespace: opensphere-console }
spec:
  type: ExternalName
  externalName: opensphere-auth.opensphere-console-auth.svc.cluster.local
  ports: [{ name: https, port: 8443, targetPort: 8443 }]
---
apiVersion: v1
kind: Service
metadata: { name: opensphere-registry, namespace: opensphere-console }
spec:
  type: ExternalName
  externalName: opensphere-registry.opensphere-system.svc.cluster.local
  ports: [{ name: http, port: 80, targetPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: os-cli, namespace: opensphere-console }
spec:
  type: ExternalName
  externalName: os-cli.opensphere-system.svc.cluster.local
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
