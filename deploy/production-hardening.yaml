# Production availability and ingress boundaries for the Main Shell control plane.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: opensphere-console, namespace: opensphere-console }
spec: { minAvailable: 1, selector: { matchLabels: { app: opensphere-console } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: opensphere-console-backend, namespace: opensphere-console }
spec: { minAvailable: 1, selector: { matchLabels: { app: opensphere-console-backend } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: opensphere-console-dupa-controller, namespace: opensphere-console }
spec: { minAvailable: 1, selector: { matchLabels: { app: opensphere-console-dupa-controller } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: opensphere-registry, namespace: opensphere-console }
spec: { minAvailable: 1, selector: { matchLabels: { app: opensphere-registry } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: os-cli, namespace: opensphere-console }
spec: { minAvailable: 1, selector: { matchLabels: { app: os-cli } } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: opensphere-console-ingress, namespace: opensphere-console }
spec:
  podSelector: { matchLabels: { app: opensphere-console } }
  policyTypes: [Ingress]
  ingress:
    - ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 8443 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: opensphere-console-control-plane-ingress, namespace: opensphere-console }
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [opensphere-console-backend, opensphere-console-dupa-controller, opensphere-registry, os-cli]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: opensphere-console } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: opensphere-console } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: monitoring } }
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 80 }
