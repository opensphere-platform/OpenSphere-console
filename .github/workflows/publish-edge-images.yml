name: Publish Console Edge Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - angular.json
      - tsconfig*.json
      - public/**
      - src/**
      - nginx/**
      - backend/opensphere-console-backend/**
      - backend/dupa-control/**
      - backend/opensphere-console-oaa-gateway/**
      - backend/oaa-governed-adapter/**
      - backend/notification-dispatcher/**
      - backend/os-cli/**
      - backend/supabase/**
      - backend/gitea/**
      - backend/recovery/**
      - deploy/**
      - .github/workflows/publish-edge-images.yml

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: console-edge-images
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Console
        uses: actions/checkout@v4
        with:
          path: OpenSphere-console
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-SDK
          path: OpenSphere-SDK
      - name: Require private Setup read credential
        env:
          SETUP_REPOSITORY_SSH_KEY: ${{ secrets.SETUP_REPOSITORY_SSH_KEY }}
        run: test -n "$SETUP_REPOSITORY_SSH_KEY"
      - name: Checkout Setup CLI
        uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-Setup-CLI
          path: OpenSphere-Setup-CLI
          ssh-key: ${{ secrets.SETUP_REPOSITORY_SSH_KEY }}
          persist-credentials: false
      - name: Checkout Cluster Manager
        uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-shell-clusterManager
          path: OpenSphere-shell-clusterManager
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: OpenSphere-console/package-lock.json
      - name: Install SDK
        working-directory: OpenSphere-SDK
        # The SDK repository does not yet publish a package-lock.json.
        run: npm install --no-audit --no-fund && npm run build
      - name: Install Console
        working-directory: OpenSphere-console
        run: npm ci --no-audit --no-fund --legacy-peer-deps
      - name: Install controller test dependencies
        working-directory: OpenSphere-console/backend/dupa-control
        run: npm ci --no-audit --no-fund
      - name: Console contract tests
        working-directory: OpenSphere-console
        run: npm test
      - name: Production build
        working-directory: OpenSphere-console
        run: npm run build -- --configuration production

  build-macos-cli:
    # This is intentionally a native macOS build. The CLI invokes
    # Security.framework through cgo so the Keychain receives private material
    # in memory, never as a `security ... -w <secret>` process argument.
    runs-on: macos-14
    steps:
      - name: Checkout Console
        uses: actions/checkout@v4
        with:
          path: OpenSphere-console
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: OpenSphere-console/backend/os-cli/go.mod
      - name: Keychain round-trip and macOS CLI build
        working-directory: OpenSphere-console/backend/os-cli
        env:
          CLI_UPDATE_TRUST_ID: ${{ vars.CLI_UPDATE_SIGNING_KEY_ID }}
          CLI_UPDATE_TRUST_PUBLIC: ${{ vars.CLI_UPDATE_SIGNING_PUBLIC_KEY }}
        run: |
          test "$(go env GOOS)" = darwin
          test "$(go env GOARCH)" = arm64
          test "$(go env CGO_ENABLED)" = 1
          test -n "$CLI_UPDATE_TRUST_ID"
          test -n "$CLI_UPDATE_TRUST_PUBLIC"
          go test ./...
          go build -trimpath -ldflags="-s -w -X main.version=0.8.1 -X main.updateProductionKeyID=$CLI_UPDATE_TRUST_ID -X main.updateProductionPublicKey=$CLI_UPDATE_TRUST_PUBLIC" -o opensphere-cli-darwin-arm64 ./cmd/os
          GOARCH=amd64 CGO_ENABLED=1 go build -trimpath -ldflags="-s -w -X main.version=0.8.1 -X main.updateProductionKeyID=$CLI_UPDATE_TRUST_ID -X main.updateProductionPublicKey=$CLI_UPDATE_TRUST_PUBLIC" -o opensphere-cli-darwin-amd64 ./cmd/os
          file opensphere-cli-darwin-arm64 | grep -q 'arm64'
          file opensphere-cli-darwin-amd64 | grep -q 'x86_64'
      - name: Upload macOS CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensphere-cli-darwin
          path: OpenSphere-console/backend/os-cli/opensphere-cli-darwin-*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [test, build-macos-cli]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: opensphere-console
            context: .
            file: OpenSphere-console/Dockerfile
          - image: opensphere-console-backend
            context: OpenSphere-console/backend
            file: OpenSphere-console/backend/opensphere-console-backend/Dockerfile
          - image: opensphere-console-dupa-controller
            context: OpenSphere-console/backend/dupa-control
            file: OpenSphere-console/backend/dupa-control/Dockerfile
          - image: opensphere-console-oaa-gateway
            context: OpenSphere-console/backend/opensphere-console-oaa-gateway
            file: OpenSphere-console/backend/opensphere-console-oaa-gateway/Dockerfile
          - image: opensphere-oaa-governed-adapter
            context: OpenSphere-console/backend/oaa-governed-adapter
            file: OpenSphere-console/backend/oaa-governed-adapter/Dockerfile
          - image: opensphere-console-notification-dispatcher
            context: OpenSphere-console/backend/notification-dispatcher
            file: OpenSphere-console/backend/notification-dispatcher/Dockerfile
          - image: opensphere-console-recovery
            context: OpenSphere-console/backend/recovery
            file: OpenSphere-console/backend/recovery/Dockerfile
          - image: opensphere-console-gitea
            context: OpenSphere-console/backend/gitea/image
            file: OpenSphere-console/backend/gitea/image/Dockerfile
          - image: opensphere-console-supabase-postgres
            context: OpenSphere-console/backend/supabase/images/postgres
            file: OpenSphere-console/backend/supabase/images/postgres/Dockerfile
          - image: opensphere-console-supabase-auth
            context: OpenSphere-console/backend/supabase/images/auth
            file: OpenSphere-console/backend/supabase/images/auth/Dockerfile
          - image: opensphere-console-supabase-rest
            context: OpenSphere-console/backend/supabase/images/rest
            file: OpenSphere-console/backend/supabase/images/rest/Dockerfile
          - image: opensphere-console-supabase-storage
            context: OpenSphere-console/backend/supabase/images/storage
            file: OpenSphere-console/backend/supabase/images/storage/Dockerfile
          - image: opensphere-console-gitea-postgres
            context: OpenSphere-console/backend/gitea/postgres-image
            file: OpenSphere-console/backend/gitea/postgres-image/Dockerfile
    steps:
      - name: Checkout Console
        uses: actions/checkout@v4
        with:
          path: OpenSphere-console
      - name: Checkout SDK
        if: matrix.image == 'opensphere-console'
        uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-SDK
          path: OpenSphere-SDK
      - name: Download native macOS CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: opensphere-cli-darwin
          path: ${{ runner.temp }}/opensphere-cli-macos
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/opensphere-platform/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
          labels: |
            io.opensphere.channel=edge
            io.opensphere.source-revision=${{ github.sha }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-contexts: |
            macos-cli=${{ runner.temp }}/opensphere-cli-macos
          # Setup supports Linux amd64 and arm64 nodes.  The release digest is
          # a multi-platform index, so each cluster pulls its native manifest.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          build-args: |
            CLI_UPDATE_SIGNING_PROFILE=production
            CLI_UPDATE_TRUST_ID=${{ vars.CLI_UPDATE_SIGNING_KEY_ID }}
            CLI_UPDATE_TRUST_PUBLIC=${{ vars.CLI_UPDATE_SIGNING_PUBLIC_KEY }}
          secrets: |
            "cli_update_signing_key=${{ secrets.CLI_UPDATE_SIGNING_PRIVATE_KEY }}"
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - name: Attest published digest provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/opensphere-platform/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      # Generate and attest an explicit SPDX document so Setup can verify the
      # SBOM with the same GitHub Actions/Sigstore identity as provenance.
      # Do not enable Buildx's additional scanner: it duplicates this trusted
      # attestation and can make all image builds fail on a scanner-registry
      # outage before the explicit SBOM step runs.
      - name: Generate SPDX SBOM
        # anchore/sbom-action v0, pinned to the resolved v0 commit.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ghcr.io/opensphere-platform/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ runner.temp }}/${{ matrix.image }}.spdx.json
          upload-artifact: false
      - name: Attest SPDX SBOM
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/opensphere-platform/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ runner.temp }}/${{ matrix.image }}.spdx.json
          push-to-registry: true
      - name: Publish summary
        run: echo '`${{ matrix.image }}:sha-*` → `${{ steps.build.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"

  # A channel must represent a complete console release, not whichever matrix
  # member happened to finish first. The matrix publishes only an immutable
  # source tag; this job advances mutable edge tags after all attestations.
  # Readers reject any short GHCR tag-propagation window rather than installing
  # a mixed revision.
  publish-edge:
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: imjasonh/setup-crane@v0.4
      - name: Login to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: crane auth login ghcr.io -u "${{ github.actor }}" -p "$GH_TOKEN"
      - name: Verify immutable release and prepare signed BOM
        id: release-bom
        run: |
          set -euo pipefail
          source_tag="sha-${GITHUB_SHA:0:7}"
          release_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          release_tag="$(TZ=Asia/Seoul date -d "@$release_epoch" +%Y%m%d%H%M)"
          [[ "$release_tag" =~ ^[0-9]{12}$ ]]
          images=(
            opensphere-console
            opensphere-console-backend
            opensphere-console-dupa-controller
            opensphere-console-oaa-gateway
            opensphere-oaa-governed-adapter
            opensphere-console-notification-dispatcher
            opensphere-console-recovery
            opensphere-console-gitea
            opensphere-console-supabase-postgres
            opensphere-console-supabase-auth
            opensphere-console-supabase-rest
            opensphere-console-supabase-storage
            opensphere-console-gitea-postgres
          )
          component_keys=(
            console
            backend
            dupaController
            oaaGateway
            oaaGovernedAdapter
            notificationDispatcher
            recovery
            gitea
            supabasePostgres
            supabaseAuth
            supabaseRest
            supabaseStorage
            giteaPostgres
          )
          declare -A digests
          components='{}'

          # Do not move any channel tag until every immutable component was
          # built from this exact revision and admitted into the signed BOM.
          for index in "${!images[@]}"; do
            image="${images[$index]}"
            key="${component_keys[$index]}"
            repository="ghcr.io/opensphere-platform/$image"
            source="$repository:$source_tag"
            digest="$(crane digest "$source")"
            revision="$(crane config "$source" | jq -r '.config.Labels["io.opensphere.source-revision"] // empty')"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "$source has an invalid digest: $digest" >&2
              exit 1
            fi
            if [[ "$revision" != "$GITHUB_SHA" ]]; then
              echo "$source revision $revision differs from workflow $GITHUB_SHA" >&2
              exit 1
            fi
            digests[$image]="$digest"
            components="$(jq -c \
              --arg key "$key" \
              --arg repository "$image" \
              --arg image "$repository@$digest" \
              --arg revision "$GITHUB_SHA" \
              '. + {($key): {repository: $repository, image: $image, sourceRevision: $revision}}' \
              <<<"$components")"
          done

          jq -n \
            --arg apiVersion 'release.opensphere.io/v1alpha1' \
            --arg kind 'OpenSphereReleaseBOM' \
            --arg channel 'edge' \
            --arg status 'Active' \
            --arg releaseTag "$release_tag" \
            --arg source 'https://github.com/opensphere-platform/OpenSphere-console' \
            --arg sourceRevision "$GITHUB_SHA" \
            --argjson supportedPlatforms '["linux/amd64", "linux/arm64"]' \
            --argjson components "$components" \
            '{apiVersion: $apiVersion, kind: $kind, channel: $channel, status: $status, releaseTag: $releaseTag,
              source: $source, sourceRevision: $sourceRevision,
              supportedPlatforms: $supportedPlatforms, components: $components}' \
            > "$RUNNER_TEMP/opensphere-release-bom.json"

          jq -e --arg revision "$GITHUB_SHA" \
            '.sourceRevision == $revision and (.components | length) == 13' \
            "$RUNNER_TEMP/opensphere-release-bom.json" >/dev/null
          echo "anchor-digest=${digests[opensphere-console]}" >> "$GITHUB_OUTPUT"
          echo "release-tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo 'Signed Release BOM prepared; no mutable channel tag has moved.' >> "$GITHUB_STEP_SUMMARY"

      - name: Attest atomic OpenSphere Release BOM
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/opensphere-platform/opensphere-console
          subject-digest: ${{ steps.release-bom.outputs.anchor-digest }}
          predicate-type: https://opensphere.io/attestations/release-bom/v1
          predicate-path: ${{ runner.temp }}/opensphere-release-bom.json
          push-to-registry: true

      - name: Advance edge with Console anchor last
        env:
          RELEASE_TAG: ${{ steps.release-bom.outputs.release-tag }}
        run: |
          set -euo pipefail
          bom="$RUNNER_TEMP/opensphere-release-bom.json"
          publish_immutable_tag() {
            local repository="$1" digest="$2" existing
            existing="$(crane digest "$repository:$RELEASE_TAG" 2>/dev/null || true)"
            if [[ -n "$existing" && "$existing" != "$digest" ]]; then
              echo "Immutable release tag collision: $repository:$RELEASE_TAG is $existing, expected $digest" >&2
              exit 1
            fi
            crane tag "$repository@$digest" "$RELEASE_TAG"
            test "$(crane digest "$repository:$RELEASE_TAG")" = "$digest"
          }
          images=(
            opensphere-console-backend
            opensphere-console-dupa-controller
            opensphere-console-oaa-gateway
            opensphere-oaa-governed-adapter
            opensphere-console-notification-dispatcher
            opensphere-console-recovery
            opensphere-console-gitea
            opensphere-console-supabase-postgres
            opensphere-console-supabase-auth
            opensphere-console-supabase-rest
            opensphere-console-supabase-storage
            opensphere-console-gitea-postgres
          )
          component_keys=(
            backend
            dupaController
            oaaGateway
            oaaGovernedAdapter
            notificationDispatcher
            recovery
            gitea
            supabasePostgres
            supabaseAuth
            supabaseRest
            supabaseStorage
            giteaPostgres
          )

          # Non-anchor tags may move first. Setup never samples them; it reads
          # their immutable digests from the signed BOM attached to Console.
          for index in "${!images[@]}"; do
            image="${images[$index]}"
            key="${component_keys[$index]}"
            repository="ghcr.io/opensphere-platform/$image"
            digest="$(jq -r --arg key "$key" '.components[$key].image | split("@")[1]' "$bom")"
            publish_immutable_tag "$repository" "$digest"
            crane tag "$repository@$digest" edge
          done

          # This is the atomic publication point. If any earlier step fails,
          # Console:edge still anchors the previous complete signed BOM.
          anchor_digest="$(jq -r '.components.console.image | split("@")[1]' "$bom")"
          anchor_repository="ghcr.io/opensphere-platform/opensphere-console"
          publish_immutable_tag "$anchor_repository" "$anchor_digest"
          crane tag "$anchor_repository@$anchor_digest" edge

          for key in $(jq -r '.components | keys[]' "$bom"); do
            image="$(jq -r --arg key "$key" '.components[$key].repository' "$bom")"
            repository="ghcr.io/opensphere-platform/$image"
            expected="$(jq -r --arg key "$key" '.components[$key].image | split("@")[1]' "$bom")"
            test "$(crane digest "$repository:$RELEASE_TAG")" = "$expected"
            actual="$(crane digest "$repository:edge")"
            if [[ "$actual" != "$expected" ]]; then
              echo "$repository:edge resolved to $actual, expected $expected" >&2
              exit 1
            fi
            echo "- \`$image:edge\` → \`$expected\`" >> "$GITHUB_STEP_SUMMARY"
          done
