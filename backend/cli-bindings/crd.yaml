# CLIDownload — future external/workforce CLI artifact Binding. Native os is explicitly excluded.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clidownloads.console.opensphere.io
spec:
  group: console.opensphere.io
  scope: Cluster
  names:
    kind: CLIDownload
    plural: clidownloads
    singular: clidownload
    listKind: CLIDownloadList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [displayName, links]
              properties:
                displayName: { type: string }
                description: { type: string }
                enabled: { type: boolean, default: true }
                audience: { type: string, enum: [workforce, external], description: "admin is reserved for the native os CLI" }
                links:
                  type: array
                  items:
                    type: object
                    required: [href, text]
                    properties:
                      href: { type: string }
                      text: { type: string }
                      os: { type: string, enum: [linux, darwin, windows] }
                      arch: { type: string }
      additionalPrinterColumns:
        - { name: Display, type: string, jsonPath: .spec.displayName }
        - { name: Audience, type: string, jsonPath: .spec.audience }
        - { name: Enabled, type: boolean, jsonPath: .spec.enabled }
