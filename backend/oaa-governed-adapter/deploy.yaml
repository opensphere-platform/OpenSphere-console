apiVersion: v1
kind: ServiceAccount
metadata: { name: oaa-governed-adapter, namespace: opensphere-console }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: oaa-governed-adapter, namespace: opensphere-console }
rules:
  - { apiGroups: [""], resources: [configmaps, services], verbs: [get, create, patch, delete] }
  - { apiGroups: [""], resources: [persistentvolumeclaims], verbs: [get, create, patch] }
  - { apiGroups: [apps], resources: [deployments, statefulsets, daemonsets], verbs: [get, create, patch, delete] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, create, patch, delete] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies], verbs: [get, create, patch, delete] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, create, patch, delete] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, create, patch, delete] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: oaa-governed-adapter, namespace: opensphere-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: oaa-governed-adapter }
subjects: [{ kind: ServiceAccount, name: oaa-governed-adapter, namespace: opensphere-console }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: oaa-governed-adapter, namespace: opensphere-console-data }
rules:
  - { apiGroups: [""], resources: [configmaps, services], verbs: [get, create, patch, delete] }
  - { apiGroups: [""], resources: [persistentvolumeclaims], verbs: [get, create, patch] }
  - { apiGroups: [apps], resources: [deployments, statefulsets, daemonsets], verbs: [get, create, patch, delete] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, create, patch, delete] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies], verbs: [get, create, patch, delete] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, create, patch, delete] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, create, patch, delete] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: oaa-governed-adapter, namespace: opensphere-console-data }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: oaa-governed-adapter }
subjects: [{ kind: ServiceAccount, name: oaa-governed-adapter, namespace: opensphere-console }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: oaa-governed-adapter, namespace: opensphere-console-change }
rules:
  - { apiGroups: [""], resources: [configmaps, services], verbs: [get, create, patch, delete] }
  - { apiGroups: [""], resources: [persistentvolumeclaims], verbs: [get, create, patch] }
  - { apiGroups: [apps], resources: [deployments, statefulsets, daemonsets], verbs: [get, create, patch, delete] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, create, patch, delete] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies], verbs: [get, create, patch, delete] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, create, patch, delete] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, create, patch, delete] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: oaa-governed-adapter, namespace: opensphere-console-change }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: oaa-governed-adapter }
subjects: [{ kind: ServiceAccount, name: oaa-governed-adapter, namespace: opensphere-console }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: oaa-governed-adapter, namespace: opensphere-console, labels: { app: oaa-governed-adapter } }
spec:
  replicas: 1
  selector: { matchLabels: { app: oaa-governed-adapter } }
  strategy: { type: Recreate }
  template:
    metadata: { labels: { app: oaa-governed-adapter } }
    spec:
      serviceAccountName: oaa-governed-adapter
      automountServiceAccountToken: true
      imagePullSecrets: [{ name: opensphere-ghcr-pull }]
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: reconciler
          image: opensphere-oaa-governed-adapter:oaa-agent-v3
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: RECONCILER_NAME, value: oaa-governed-adapter }
            - { name: GITEA_PATH, value: oaa }
            - { name: GITEA_ORGANIZATION, value: opensphere }
            - { name: GITEA_REPOSITORY, value: platform-declarations }
            - { name: ALLOWED_NAMESPACES, value: opensphere-console,opensphere-console-data,opensphere-console-change }
            - { name: OAA_SCALE_MAX, value: "10" }
            - name: GITEA_TOKEN
              valueFrom: { secretKeyRef: { name: opensphere-gitea-control-plane, key: token } }
            - name: RECONCILER_TOKEN
              valueFrom: { secretKeyRef: { name: opensphere-gitea-control-plane, key: reconciler-token } }
          readinessProbe: { httpGet: { path: /readyz, port: http }, initialDelaySeconds: 3, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 10, periodSeconds: 20 }
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 250m, memory: 128Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata: { name: oaa-governed-adapter, namespace: opensphere-console }
spec:
  selector: { app: oaa-governed-adapter }
  ports: [{ name: http, port: 8080, targetPort: http }]
