# opensphere-console-oaa-gateway — Main Shell native OAA Core runtime (CONSTITUTION-0004 §4.2/§4.5).
# Ownership and lifecycle are Console/Main Shell native, exactly like Manual. This is NOT an
# optional AI staging manifest, NOT a subShell/Consumer, and NOT an independent
# platform pillar. It is installed after Supabase Data & Identity and Gitea
# Declarative Change Authority are Ready. Clean bootstrap, upgrade and uninstall
# own its lifecycle; a normal install must not require a post-install patch.
# Before Cluster Manager Activated + HIS Preflight Ready, Kubernetes mutation/action tools stay
# fail closed (OAA_MUTATION_ENABLED='false' below) and this base runtime grants no deployment
# patch RBAC at all — see the removed *-controlled-operator ClusterRole/ClusterRoleBinding below.
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-oaa-credentials
  labels:
    app.kubernetes.io/part-of: opensphere-console
    opensphere.io/scope: oaa-provider-credentials
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-console }
---
# OAA is a planner/read broker, not a Kubernetes write principal.  Key rotation
# and all other mutations go through Console Backend policy/approval flow.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-console }
rules:
  - { apiGroups: [""], resources: [pods, services, endpoints, events, configmaps, persistentvolumeclaims], verbs: [get, list, watch] }
  - { apiGroups: [""], resources: [pods/log], verbs: [get] }
  - { apiGroups: [apps], resources: [deployments, statefulsets, daemonsets, replicasets], verbs: [get, list, watch] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, list, watch] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies], verbs: [get, list, watch] }
  - { apiGroups: [discovery.k8s.io], resources: [endpointslices], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, list, watch] }
  - { apiGroups: [platform.opensphere.io], resources: [platformsupportprofiles], verbs: [get, list, watch] }
  - { apiGroups: [plugins.opensphere.io], resources: [uipluginpackages, uipluginregistrations], verbs: [get, list, watch] }
  - { apiGroups: [foundation.opensphere.io], resources: [foundationclaims, foundationbindings, identitydirectoryclaims, identitydirectorybindings], verbs: [get, list, watch] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-oaa-gateway }
subjects: [{ kind: ServiceAccount, name: opensphere-console-oaa-gateway, namespace: opensphere-console }]
---
# Provider credentials are isolated from Console auth, Gitea, Supabase, TLS and
# notification Secrets. This namespace contains only `oaa-llm-*` objects.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: opensphere-console-oaa-gateway-credentials, namespace: opensphere-oaa-credentials }
rules:
  - { apiGroups: [""], resources: [secrets], verbs: [get, list] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: opensphere-console-oaa-gateway-credentials, namespace: opensphere-oaa-credentials }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-oaa-gateway-credentials }
