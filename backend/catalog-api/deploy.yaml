# opensphere-catalog-api — mainShell 네이티브 카탈로그 엔진(B/E). 셸 nginx /api/rhdh → 이 서비스로 재포인트.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensphere-catalog-api
  namespace: opensphere-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensphere-catalog-api
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensphere-catalog-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opensphere-catalog-api
subjects:
  - kind: ServiceAccount
    name: opensphere-catalog-api
    namespace: opensphere-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensphere-catalog-api
  namespace: opensphere-system
  labels: { app: opensphere-catalog-api }
spec:
  replicas: 1
  selector: { matchLabels: { app: opensphere-catalog-api } }
  template:
    metadata:
      labels: { app: opensphere-catalog-api }
    spec:
      serviceAccountName: opensphere-catalog-api
      containers:
        - name: catalog-api
          image: localhost:5000/opensphere-catalog-api:dev
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 2 }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-catalog-api
  namespace: opensphere-system
spec:
  selector: { app: opensphere-catalog-api }
  ports: [{ port: 8080, targetPort: 8080 }]
