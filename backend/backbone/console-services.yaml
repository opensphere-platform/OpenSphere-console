# opensphere-console-oaa-gateway — Main Shell native OAA Core runtime (CONSTITUTION-0004 §4.2/§4.5).
# Ownership and lifecycle are Console/Main Shell native, exactly like Manual. This is NOT an
# optional AI staging manifest, NOT a subShell/Consumer, and NOT a fourth CBS pillar — it is a
# CBS consumer (Backbone PostgreSQL/pgvector) installed only after the CBS three pillars
# (PostgreSQL/RustFS/Gitea) are Ready. clean bootstrap/upgrade/uninstall own its lifecycle; a
# normal install must not require a separate post-install patch.
# Before Cluster Manager Activated + HIS Preflight Ready, Kubernetes mutation/action tools stay
# fail closed (OAA_MUTATION_ENABLED='false' below) and this base runtime grants no deployment
# patch RBAC at all — see the removed *-controlled-operator ClusterRole/ClusterRoleBinding below.
apiVersion: v1
kind: ServiceAccount
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-backbone }
---
# Namespace-scoped Secret custody for LLM provider keys (opensphere.io/oaa-llm-key=true). This is
# the only write-capable RBAC the base runtime holds, and it is confined to opensphere-backbone.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-backbone }
rules:
  - { apiGroups: [""], resources: [secrets], verbs: [get, list, create, patch, delete] }
  - { apiGroups: [""], resources: [pods, pods/log, services, events], verbs: [get, list] }
  - { apiGroups: [apps], resources: [deployments, statefulsets, daemonsets, replicasets], verbs: [get, list] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-backbone }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-oaa-gateway }
subjects: [{ kind: ServiceAccount, name: opensphere-console-oaa-gateway, namespace: opensphere-backbone }]
---
# Read-only environment reader across the allowlisted namespaces the OAA `/env`, `/pods`,
# `/services`, `/events`, `/describe`, `/rollout` tools summarize. No write verb anywhere here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: opensphere-console-oaa-gateway-environment-reader }
rules:
  - { apiGroups: [""], resources: [pods, pods/log, services, events], verbs: [get, list] }
  - { apiGroups: [apps], resources: [deployments, statefulsets, daemonsets, replicasets], verbs: [get, list] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: opensphere-console-oaa-gateway-environment-reader }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: opensphere-console-oaa-gateway-environment-reader }
subjects: [{ kind: ServiceAccount, name: opensphere-console-oaa-gateway, namespace: opensphere-backbone }]
---
# CONSTITUTION-0004 §4.2: before Cluster Manager Activated + HIS Preflight Ready, OAA must stay
# read-only. The base runtime therefore grants NO deployment patch capability at all — the former
# opensphere-console-oaa-gateway-controlled-operator ClusterRole/ClusterRoleBinding (apps/deployments
# get/list/patch) is permanently removed from this manifest, not merely left unbound. Any later
# controlled-mutation capability is a Cluster Manager Activated + HIS Preflight Ready gated addition,
# never a base-install grant.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensphere-console-oaa-gateway
  namespace: opensphere-backbone
  labels:
    app: opensphere-console-oaa-gateway
    app.kubernetes.io/name: opensphere-console-oaa-gateway
    app.kubernetes.io/component: oaa-core
    app.kubernetes.io/part-of: opensphere-console
    opensphere.io/layer: console-service
    opensphere.io/scope: main-shell-core
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: opensphere-console-oaa-gateway } }
  template:
    metadata:
      labels:
        app: opensphere-console-oaa-gateway
        app.kubernetes.io/name: opensphere-console-oaa-gateway
        app.kubernetes.io/component: oaa-core
        app.kubernetes.io/part-of: opensphere-console
        opensphere.io/layer: console-service
        opensphere.io/scope: main-shell-core
    spec:
      serviceAccountName: opensphere-console-oaa-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: gateway
          # Canonical GHCR repo pinned by digest, never a mutable tag. Setup replaces the
          # __OAA_GATEWAY_IMAGE_DIGEST__ token with the release-pinned sha256 digest from the BOM
          # before this manifest is applied (NAMING-STANDARD §1/§4/§6).
          image: ghcr.io/opensphere-platform/opensphere-console-oaa-gateway@sha256:__OAA_GATEWAY_IMAGE_DIGEST__
          imagePullPolicy: IfNotPresent
          env:
            - { name: BACKBONE_NS, value: opensphere-backbone }
            - { name: KANIDM_ISSUERS, value: "__OPENSPHERE_CONSOLE_URL__/oauth2/openid/opensphere-console" }
            - { name: KANIDM_JWKS_URL, value: https://opensphere-console-auth.opensphere-console.svc:8443/oauth2/openid/opensphere-console/public_key.jwk }
            - { name: KANIDM_TLS_SERVERNAME, value: kanidm.opensphere-console-auth.svc }
            - { name: KANIDM_CA_PATH, value: /etc/kanidm-ca/ca.crt }
            - { name: KANIDM_AZP, value: opensphere-console }
            - { name: KANIDM_ADMIN_GROUP, value: opensphere-console-admins }
            # Live identity authority (no cache): every authenticated request re-checks the exact
            # raw JWT against the auth BFF's current session/PAT/CLI state, same as
            # dupa-control's TOKEN_INTROSPECTION_URL/SERVERNAME. Reuses the kanidm-ca mount above.
            - { name: TOKEN_INTROSPECTION_URL, value: https://opensphere-console-auth.opensphere-console.svc:8443/bff/token/introspect }
            - { name: TOKEN_INTROSPECTION_SERVERNAME, value: kanidm.opensphere-console-auth.svc }
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            - { name: BACKBONE_PG_HOST, value: backbone-postgres.opensphere-backbone.svc.cluster.local }
            - { name: BACKBONE_PG_PORT, value: "5432" }
            - { name: BACKBONE_PG_DB, value: console }
            # Dedicated, independently-generated OAA PostgreSQL identity (CONSTITUTION-0004
            # §4.5 OAA bootstrap boundary) -- never the console runtime role/password, and it
            # holds no audit-table grants. See backend/backbone/bootstrap/backbone.yaml.
            - { name: BACKBONE_PG_USER, value: opensphere_oaa }
            - { name: BACKBONE_PG_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: oaa_password } } }
            # opensphere_oaa owns this schema and has USAGE-only (never CREATE) on public;
            # search_path resolves unqualified OAA table names into it without opening public.
            - { name: BACKBONE_PG_SCHEMA, value: oaa }
            # Verified TLS to Backbone PostgreSQL using the same Setup-managed installation CA
            # mounted below (never a baked-in image certificate, never disabled verification).
            - { name: BACKBONE_PG_CA_PATH, value: /etc/backbone-postgres-ca/ca.crt }
            - { name: OAA_EMBED_DIM, value: "384" }
            - { name: OAA_RAG_TOP_K, value: "5" }
            # CONSTITUTION-0004 §4.2 fail-closed default: Kubernetes mutation/action tools stay
            # unavailable until Cluster Manager Activated + HIS Preflight Ready explicitly flips this.
            - { name: OAA_MUTATION_ENABLED, value: "false" }
          ports: [{ name: http, containerPort: 8080 }]
          # /healthz is liveness/startup only. /readyz additionally requires PostgreSQL connectivity,
          # the pgvector/schema migration, the bundled Manual Registry seed, and the tool registry
          # seed to be live before this Pod is added to the Service endpoints.
          startupProbe: { httpGet: { path: /healthz, port: http }, periodSeconds: 3, failureThreshold: 40 }
          readinessProbe: { httpGet: { path: /readyz, port: http }, periodSeconds: 5, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            # Setup-provisioned installation CA — never a baked-in image certificate.
            - { name: kanidm-ca, mountPath: /etc/kanidm-ca, readOnly: true }
            # Same Setup-managed installation CA, sourced from the backbone-postgres Secret
            # (already holds ca.crt for the CBS PostgreSQL leaf) so the OAA gateway verifies
            # the Backbone PostgreSQL server certificate rather than skipping TLS validation.
            - { name: backbone-postgres-ca, mountPath: /etc/backbone-postgres-ca, readOnly: true }
      volumes:
        - { name: tmp, emptyDir: {} }
        - name: kanidm-ca
          secret:
            secretName: opensphere-console-auth-ca
            items: [{ key: ca.crt, path: ca.crt }]
        - name: backbone-postgres-ca
          secret:
            secretName: backbone-postgres
            items: [{ key: ca.crt, path: ca.crt }]
---
apiVersion: v1
kind: Service
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-backbone, labels: { app: opensphere-console-oaa-gateway } }
spec:
  selector: { app: opensphere-console-oaa-gateway }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: opensphere-console-oaa-gateway, namespace: opensphere-backbone }
spec: { minAvailable: 1, selector: { matchLabels: { app: opensphere-console-oaa-gateway } } }
---
# Ingress is limited to the Console namespace (same-origin nginx proxy + Main Shell readiness
# probe) and pods within this same Backbone namespace, each allowed exactly once.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: opensphere-console-oaa-gateway-ingress, namespace: opensphere-backbone }
spec:
  podSelector: { matchLabels: { app: opensphere-console-oaa-gateway } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - { namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: opensphere-console } } }
        - { podSelector: {} }
      ports: [{ protocol: TCP, port: 8080 }]
