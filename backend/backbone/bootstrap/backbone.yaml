apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-backbone
  labels:
    opensphere.io/layer: backbone
    opensphere.io/required-by: opensphere-console
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-postgres, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-rustfs, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-gitea, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backbone-postgres-init
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres }
data:
  00-console-runtime-boundary.sh: |
    #!/bin/sh
    # This executes only while PostgreSQL initialises an empty data directory.
    # POSTGRES_USER is a sealed bootstrap operator; console is created separately
    # as the constrained runtime account used by Console services.
    set -eu
    : "${OPENSPHERE_CONSOLE_PASSWORD:?OPENSPHERE_CONSOLE_PASSWORD is required}"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" --set=console_password="$OPENSPHERE_CONSOLE_PASSWORD" <<'SQL'
    CREATE EXTENSION IF NOT EXISTS vector;
    \connect template1
    CREATE EXTENSION IF NOT EXISTS vector;
    \connect console

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opensphere_audit_owner') THEN
        CREATE ROLE opensphere_audit_owner NOLOGIN SUPERUSER NOINHERIT NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS;
      END IF;
    END
    $$;

    SELECT format('CREATE ROLE console LOGIN PASSWORD %L NOSUPERUSER INHERIT CREATEROLE CREATEDB NOREPLICATION NOBYPASSRLS', :'console_password')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'console') \gexec
    SELECT format('ALTER ROLE console LOGIN PASSWORD %L NOSUPERUSER INHERIT CREATEROLE CREATEDB NOREPLICATION NOBYPASSRLS', :'console_password')
      WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'console') \gexec

    CREATE TABLE public.audit_log (
      id      bigserial PRIMARY KEY,
      ts      timestamptz NOT NULL DEFAULT now(),
      op_id   text,
      actor   text,
      action  text,
      target  text,
      result  text,
      reason  text
    );
    CREATE INDEX audit_log_ts_idx ON public.audit_log (ts DESC);
    CREATE INDEX audit_log_actor_idx ON public.audit_log (actor);
    CREATE INDEX audit_log_action_idx ON public.audit_log (action);
    CREATE FUNCTION public.opensphere_reject_audit_mutation()
      RETURNS trigger LANGUAGE plpgsql AS $$
      BEGIN
        RAISE EXCEPTION 'audit_log is append-only';
      END;
      $$;
    CREATE TRIGGER audit_log_append_only
      BEFORE UPDATE OR DELETE ON public.audit_log
      FOR EACH ROW EXECUTE FUNCTION public.opensphere_reject_audit_mutation();

    CREATE TABLE public.managed_credential (
      kind          text NOT NULL,
      credential_id text NOT NULL,
      owner_name    text NOT NULL,
      record        jsonb NOT NULL,
      created_at    timestamptz NOT NULL DEFAULT now(),
      updated_at    timestamptz NOT NULL DEFAULT now(),
      last_used_at  timestamptz,
      PRIMARY KEY (kind, credential_id),
      CHECK (kind IN ('pat', 'device'))
    );
    CREATE INDEX managed_credential_owner_idx ON public.managed_credential (owner_name, kind);

    ALTER DATABASE console OWNER TO opensphere_audit_owner;
    ALTER TABLE public.audit_log OWNER TO opensphere_audit_owner;
    ALTER SEQUENCE public.audit_log_id_seq OWNER TO opensphere_audit_owner;
    ALTER FUNCTION public.opensphere_reject_audit_mutation() OWNER TO opensphere_audit_owner;
    ALTER TABLE public.managed_credential OWNER TO opensphere_audit_owner;
    ALTER TABLE public.audit_log ENABLE ALWAYS TRIGGER audit_log_append_only;

    REVOKE ALL ON DATABASE console FROM PUBLIC;
    GRANT CONNECT ON DATABASE console TO console;
    REVOKE CREATE ON SCHEMA public FROM PUBLIC;
    REVOKE ALL ON SCHEMA public FROM console;
    GRANT USAGE ON SCHEMA public TO console;
    REVOKE ALL ON TABLE public.audit_log FROM PUBLIC;
    REVOKE ALL ON TABLE public.managed_credential FROM PUBLIC;
    REVOKE ALL ON SEQUENCE public.audit_log_id_seq FROM PUBLIC;
    GRANT SELECT, INSERT ON TABLE public.audit_log TO console;
    GRANT USAGE, SELECT ON SEQUENCE public.audit_log_id_seq TO console;
    GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.managed_credential TO console;
    SQL
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backbone-postgres-data
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: { requests: { storage: 8Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backbone-postgres
  namespace: opensphere-backbone
  labels: { app: backbone-postgres, opensphere.io/backbone-module: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: backbone-postgres } }
  template:
    metadata:
      labels: { app: backbone-postgres, opensphere.io/backbone-module: postgres }
    spec:
      serviceAccountName: backbone-postgres
      securityContext: { runAsNonRoot: true, runAsUser: 70, runAsGroup: 70, fsGroup: 70, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: postgres
          image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
          imagePullPolicy: IfNotPresent
          env:
            - { name: POSTGRES_DB, value: console }
            - { name: POSTGRES_USER, value: opensphere_db_bootstrap }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: bootstrap_password } } }
            - { name: OPENSPHERE_CONSOLE_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: password } } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ name: postgres, containerPort: 5432 }]
          startupProbe: { exec: { command: [sh, -c, pg_isready -U opensphere_db_bootstrap -d console] }, periodSeconds: 3, failureThreshold: 40 }
          readinessProbe: { exec: { command: [sh, -c, pg_isready -U opensphere_db_bootstrap -d console] }, periodSeconds: 5 }
          livenessProbe: { exec: { command: [sh, -c, pg_isready -U opensphere_db_bootstrap -d console] }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: backbone-postgres-data } }
        - { name: init, configMap: { name: backbone-postgres-init, defaultMode: 365 } }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: backbone-postgres
  namespace: opensphere-backbone
  labels: { app: backbone-postgres, opensphere.io/backbone-module: postgres }
spec:
  selector: { app: backbone-postgres }
  ports: [{ name: postgres, port: 5432, targetPort: postgres }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: backbone-postgres, namespace: opensphere-backbone }
spec: { minAvailable: 1, selector: { matchLabels: { app: backbone-postgres } } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backbone-rustfs
  namespace: opensphere-backbone
  labels: { app: backbone-rustfs, opensphere.io/backbone-module: rustfs }
spec:
  serviceName: backbone-rustfs
  replicas: 1
  selector: { matchLabels: { app: backbone-rustfs } }
  template:
    metadata:
      labels: { app: backbone-rustfs, opensphere.io/backbone-module: rustfs }
    spec:
      serviceAccountName: backbone-rustfs
      securityContext: { runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: rustfs
          image: opensphere-backbone-rustfs@sha256:ae16738e96b981b958808dd4b84ada2ef60fc1947475aebae1d128a0eb1a7bd3
          imagePullPolicy: IfNotPresent
          env:
            - { name: RUSTFS_VOLUMES, value: /data }
            - { name: RUSTFS_ADDRESS, value: 0.0.0.0:9000 }
            - { name: RUSTFS_CONSOLE_ADDRESS, value: 0.0.0.0:9001 }
            - { name: RUSTFS_CONSOLE_ENABLE, value: "true" }
            - { name: RUSTFS_ACCESS_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: access_key } } }
            - { name: RUSTFS_SECRET_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: secret_key } } }
          ports:
            - { name: s3, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          startupProbe: { tcpSocket: { port: s3 }, periodSeconds: 3, failureThreshold: 40 }
          readinessProbe: { tcpSocket: { port: s3 }, periodSeconds: 5 }
          livenessProbe: { tcpSocket: { port: s3 }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: logs, mountPath: /logs }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: logs, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
  volumeClaimTemplates:
    - metadata: { name: data, labels: { opensphere.io/backbone-module: rustfs } }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: backbone-rustfs
  namespace: opensphere-backbone
  labels: { app: backbone-rustfs, opensphere.io/backbone-module: rustfs }
spec:
  clusterIP: None
  selector: { app: backbone-rustfs }
  ports:
    - { name: s3, port: 9000, targetPort: s3 }
    - { name: console, port: 9001, targetPort: console }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: backbone-rustfs, namespace: opensphere-backbone }
spec: { minAvailable: 1, selector: { matchLabels: { app: backbone-rustfs } } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backbone-gitea-data
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: gitea }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backbone-gitea
  namespace: opensphere-backbone
  labels: { app: backbone-gitea, opensphere.io/backbone-module: gitea }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: backbone-gitea } }
  template:
    metadata:
      labels: { app: backbone-gitea, opensphere.io/backbone-module: gitea }
    spec:
      serviceAccountName: backbone-gitea
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      initContainers:
        - name: database-init
          image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
          imagePullPolicy: IfNotPresent
          env:
            - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: password } } }
            - { name: GITEA_DB_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-gitea, key: db_password } } }
          command: [sh, -c]
          args:
            - |
              set -eu
              until pg_isready -h backbone-postgres -U console -d postgres; do sleep 2; done
              psql -v ON_ERROR_STOP=1 -h backbone-postgres -U console -d postgres -v gpass="$GITEA_DB_PASSWORD" <<'SQL'
              SELECT format('CREATE ROLE gitea LOGIN PASSWORD %L', :'gpass') WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname='gitea') \gexec
              SELECT format('ALTER ROLE gitea LOGIN PASSWORD %L', :'gpass') WHERE EXISTS (SELECT FROM pg_roles WHERE rolname='gitea') \gexec
              SELECT 'CREATE DATABASE gitea OWNER gitea' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='gitea') \gexec
              SQL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
      containers:
        - name: gitea
          image: opensphere-backbone-gitea@sha256:a01aa34bb2516cb5c56ae423352dbc20091f94a12a15ee5e8187fc159e3c4e23
          imagePullPolicy: IfNotPresent
          env:
            - { name: GITEA__database__DB_TYPE, value: postgres }
            - { name: GITEA__database__HOST, value: backbone-postgres.opensphere-backbone.svc.cluster.local:5432 }
            - { name: GITEA__database__NAME, value: gitea }
            - { name: GITEA__database__USER, value: gitea }
            - { name: GITEA__database__PASSWD, valueFrom: { secretKeyRef: { name: backbone-gitea, key: db_password } } }
            - { name: GITEA__database__SSL_MODE, value: disable }
            - { name: GITEA__security__INSTALL_LOCK, value: "true" }
            - { name: GITEA__server__OFFLINE_MODE, value: "true" }
            - { name: GITEA__server__ROOT_URL, value: http://backbone-gitea.opensphere-backbone.svc.cluster.local:3000/ }
            - { name: GITEA__server__HTTP_PORT, value: "3000" }
            - { name: GITEA__metrics__ENABLED, value: "true" }
            - { name: GITEA__lfs__STORAGE_TYPE, value: minio }
            - { name: GITEA__lfs__MINIO_ENDPOINT, value: backbone-rustfs.opensphere-backbone.svc.cluster.local:9000 }
            - { name: GITEA__lfs__MINIO_ACCESS_KEY_ID, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: access_key } } }
            - { name: GITEA__lfs__MINIO_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: secret_key } } }
            - { name: GITEA__lfs__MINIO_BUCKET, value: gitea-lfs }
            - { name: GITEA__lfs__MINIO_LOCATION, value: us-east-1 }
            - { name: GITEA__lfs__MINIO_USE_SSL, value: "false" }
          ports: [{ name: http, containerPort: 3000 }]
          startupProbe: { httpGet: { path: /api/healthz, port: http }, periodSeconds: 5, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /api/healthz, port: http }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /api/healthz, port: http }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /var/lib/gitea }
            - { name: config, mountPath: /etc/gitea }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: backbone-gitea-data } }
        - { name: config, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: backbone-gitea
  namespace: opensphere-backbone
  labels: { app: backbone-gitea, opensphere.io/backbone-module: gitea }
spec:
  selector: { app: backbone-gitea }
  ports: [{ name: http, port: 3000, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: backbone-gitea, namespace: opensphere-backbone }
spec: { minAvailable: 1, selector: { matchLabels: { app: backbone-gitea } } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: backbone-default-deny-ingress, namespace: opensphere-backbone }
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: backbone-postgres-ingress, namespace: opensphere-backbone }
spec:
  podSelector: { matchLabels: { app: backbone-postgres } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - { podSelector: {} }
        - { namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: opensphere-console } } }
      ports: [{ protocol: TCP, port: 5432 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: backbone-rustfs-ingress, namespace: opensphere-backbone }
spec:
  podSelector: { matchLabels: { app: backbone-rustfs } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - { podSelector: {} }
        - { namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: opensphere-console } } }
      ports:
        - { protocol: TCP, port: 9000 }
        - { protocol: TCP, port: 9001 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: backbone-gitea-ingress, namespace: opensphere-backbone }
spec:
  podSelector: { matchLabels: { app: backbone-gitea } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - { podSelector: {} }
        - { namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: opensphere-console } } }
      ports: [{ protocol: TCP, port: 3000 }]
