apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-backbone
  labels:
    opensphere.io/layer: backbone
    opensphere.io/required-by: opensphere-console
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-postgres, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-rustfs, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-gitea, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: backbone-postgres-backup, namespace: opensphere-backbone }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backbone-postgres-backup-scripts
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres, opensphere.io/recovery: audit }
data:
  backup.sh: |
    #!/bin/sh
    # Audit is evidence: a failed upload is a failed backup, never a best-effort success.
    set -eu
    : "${PGPASSWORD:?PGPASSWORD is required}"
    : "${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY is required}"
    : "${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY is required}"
    export PGPASSWORD
    endpoint="${RUSTFS_ENDPOINT:-https://backbone-rustfs.opensphere-backbone.svc.cluster.local:9000}"
    key="postgres/console-$(date -u +%Y%m%dT%H%M%SZ).dump"
    dump="/tmp/console.dump"
    cleanup() { rm -f "$dump"; }
    trap cleanup EXIT
    pg_dump -h backbone-postgres.opensphere-backbone.svc.cluster.local -U console -d console \
      --format=custom --no-owner --no-privileges --file="$dump"
    test -s "$dump"
    curl --fail --silent --show-error --cacert /tls/ca.crt --connect-timeout 5 --max-time 900 \
      --aws-sigv4 "aws:amz:us-east-1:s3" --user "${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}" \
      --upload-file "$dump" "${endpoint}/backups/${key}"
    # Objects are lexicographically time-ordered. Enforce retention server-side from the
    # writer; a failed cleanup does not invalidate the just-written recovery point.
    retention_days="${BACKUP_RETENTION_DAYS:-30}"
    # The PostgreSQL 19 Alpine image uses BusyBox date, which accepts an epoch
    # timestamp but not GNU date's relative "N days ago" expression.  Keep the
    # retention gate portable so a successful upload cannot be followed by a
    # failed cleanup (and falsely mark the recovery point as failed).
    cutoff_epoch="$(( $(date -u +%s) - retention_days * 86400 ))"
    cutoff="$(date -u -d "@${cutoff_epoch}" +%Y%m%dT%H%M%SZ)"
    curl --fail --silent --show-error --cacert /tls/ca.crt --connect-timeout 5 --max-time 60 \
      --aws-sigv4 "aws:amz:us-east-1:s3" --user "${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}" \
      "${endpoint}/backups?list-type=2&prefix=postgres/" \
      | sed -n 's#.*<Key>\(postgres/console-[0-9TZ]*\.dump\)</Key>.*#\1#p' \
      | while IFS= read -r old_key; do
          old_stamp="${old_key#postgres/console-}"; old_stamp="${old_stamp%.dump}"
          if [ "$old_stamp" \< "$cutoff" ]; then
            curl --fail --silent --show-error --cacert /tls/ca.crt --connect-timeout 5 --max-time 60 \
              --aws-sigv4 "aws:amz:us-east-1:s3" --user "${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}" \
              -X DELETE "${endpoint}/backups/${old_key}"
          fi
        done
    printf '%s\n' "backup_key=${key}"
  restore-drill.sh: |
    #!/bin/sh
    # A non-destructive recovery drill: restore the newest audit dump into an ephemeral
    # database, validate its evidence table, then drop that database before exit.
    set -eu
    : "${PGPASSWORD:?PGPASSWORD is required}"
    : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    : "${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY is required}"
    : "${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY is required}"
    endpoint="${RUSTFS_ENDPOINT:-https://backbone-rustfs.opensphere-backbone.svc.cluster.local:9000}"
    key="$(curl --fail --silent --show-error --cacert /tls/ca.crt --connect-timeout 5 --max-time 60 \
      --aws-sigv4 "aws:amz:us-east-1:s3" --user "${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}" \
      "${endpoint}/backups?list-type=2&prefix=postgres/" \
      | sed -n 's#.*<Key>\(postgres/console-[0-9TZ]*\.dump\)</Key>.*#\1#p' | tail -n 1)"
    test -n "$key"
    dump=/tmp/restore.dump
    drill_db="console_restore_drill_$(date -u +%Y%m%d%H%M%S)"
    cleanup() {
      rm -f "$dump"
      PGPASSWORD="$POSTGRES_PASSWORD" dropdb -h backbone-postgres.opensphere-backbone.svc.cluster.local \
        -U opensphere_db_bootstrap --if-exists "$drill_db" || true
    }
    trap cleanup EXIT
    curl --fail --silent --show-error --cacert /tls/ca.crt --connect-timeout 5 --max-time 900 \
      --aws-sigv4 "aws:amz:us-east-1:s3" --user "${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}" \
      "${endpoint}/backups/${key}" --output "$dump"
    PGPASSWORD="$POSTGRES_PASSWORD" createdb -h backbone-postgres.opensphere-backbone.svc.cluster.local \
      -U opensphere_db_bootstrap "$drill_db"
    PGPASSWORD="$POSTGRES_PASSWORD" pg_restore -h backbone-postgres.opensphere-backbone.svc.cluster.local \
      -U opensphere_db_bootstrap -d "$drill_db" --no-owner --no-privileges "$dump"
    PGPASSWORD="$POSTGRES_PASSWORD" psql -h backbone-postgres.opensphere-backbone.svc.cluster.local \
      -U opensphere_db_bootstrap -d "$drill_db" -Atc "SELECT to_regclass('public.audit_log') IS NOT NULL" | grep -qx t
    printf '%s\n' "restore_drill=passed backup_key=${key}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backbone-postgres-init
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres }
data:
  00-console-runtime-boundary.sh: |
    #!/bin/sh
    # This executes only while PostgreSQL initialises an empty data directory.
    # POSTGRES_USER is a sealed bootstrap operator; console is created separately
    # as the constrained runtime account used by Console services.
    set -eu
    : "${OPENSPHERE_CONSOLE_PASSWORD:?OPENSPHERE_CONSOLE_PASSWORD is required}"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" --set=console_password="$OPENSPHERE_CONSOLE_PASSWORD" <<'SQL'
    CREATE EXTENSION IF NOT EXISTS vector;
    \connect template1
    CREATE EXTENSION IF NOT EXISTS vector;
    \connect console

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opensphere_audit_owner') THEN
        CREATE ROLE opensphere_audit_owner NOLOGIN SUPERUSER NOINHERIT NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS;
      END IF;
    END
    $$;

    SELECT format('CREATE ROLE console LOGIN PASSWORD %L NOSUPERUSER INHERIT NOCREATEROLE NOCREATEDB NOREPLICATION NOBYPASSRLS', :'console_password')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'console') \gexec
    SELECT format('ALTER ROLE console LOGIN PASSWORD %L NOSUPERUSER INHERIT NOCREATEROLE NOCREATEDB NOREPLICATION NOBYPASSRLS', :'console_password')
      WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'console') \gexec

    CREATE TABLE public.audit_log (
      id      bigserial PRIMARY KEY,
      ts      timestamptz NOT NULL DEFAULT now(),
      op_id   text,
      source  text NOT NULL DEFAULT 'dupa-controller',
      actor   text,
      action  text,
      target  text,
      result  text,
      reason  text
    );
    CREATE INDEX audit_log_ts_idx ON public.audit_log (ts DESC);
    CREATE INDEX audit_log_actor_idx ON public.audit_log (actor);
    CREATE INDEX audit_log_source_idx ON public.audit_log (source);
    CREATE INDEX audit_log_action_idx ON public.audit_log (action);
    CREATE FUNCTION public.opensphere_reject_audit_mutation()
      RETURNS trigger LANGUAGE plpgsql AS $$
      BEGIN
        RAISE EXCEPTION 'audit_log is append-only';
      END;
      $$;
    CREATE TRIGGER audit_log_append_only
      BEFORE UPDATE OR DELETE ON public.audit_log
      FOR EACH ROW EXECUTE FUNCTION public.opensphere_reject_audit_mutation();

    CREATE TABLE public.managed_credential (
      kind          text NOT NULL,
      credential_id text NOT NULL,
      owner_name    text NOT NULL,
      record        jsonb NOT NULL,
      created_at    timestamptz NOT NULL DEFAULT now(),
      updated_at    timestamptz NOT NULL DEFAULT now(),
      last_used_at  timestamptz,
      PRIMARY KEY (kind, credential_id),
      CHECK (kind IN ('pat', 'device'))
    );
    CREATE INDEX managed_credential_owner_idx ON public.managed_credential (owner_name, kind);

    ALTER DATABASE console OWNER TO opensphere_audit_owner;
    ALTER TABLE public.audit_log OWNER TO opensphere_audit_owner;
    ALTER SEQUENCE public.audit_log_id_seq OWNER TO opensphere_audit_owner;
    ALTER FUNCTION public.opensphere_reject_audit_mutation() OWNER TO opensphere_audit_owner;
    ALTER TABLE public.managed_credential OWNER TO opensphere_audit_owner;
    ALTER TABLE public.audit_log ENABLE ALWAYS TRIGGER audit_log_append_only;

    REVOKE ALL ON DATABASE console FROM PUBLIC;
    GRANT CONNECT ON DATABASE console TO console;
    REVOKE CREATE ON SCHEMA public FROM PUBLIC;
    REVOKE ALL ON SCHEMA public FROM console;
    GRANT USAGE ON SCHEMA public TO console;
    REVOKE ALL ON TABLE public.audit_log FROM PUBLIC;
    REVOKE ALL ON TABLE public.managed_credential FROM PUBLIC;
    REVOKE ALL ON SEQUENCE public.audit_log_id_seq FROM PUBLIC;
    GRANT SELECT, INSERT ON TABLE public.audit_log TO console;
    GRANT USAGE, SELECT ON SEQUENCE public.audit_log_id_seq TO console;
    GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.managed_credential TO console;
    SQL
---
# PostgreSQL init scripts only run on an empty PVC. This Job makes the same
# audit ownership boundary idempotent for an existing installation before any
# Console service is allowed to become Ready. It requires the sealed bootstrap
# operator: PostgreSQL protects an original cluster superuser from self-demotion,
# so a legacy `console` bootstrap role must be migrated through a fresh setup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backbone-postgres-boundary-reconcile
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres }
data:
  reconcile.sh: |
    #!/bin/sh
    set -eu
    export PGSSLMODE=verify-full
    export PGSSLROOTCERT=/tls/ca.crt
    host=backbone-postgres.opensphere-backbone.svc.cluster.local
    for attempt in $(seq 1 120); do
      if PGPASSWORD="$BOOTSTRAP_PASSWORD" psql -h "$host" -U opensphere_db_bootstrap -d console -Atc 'SELECT 1' >/dev/null 2>&1; then
        export PGPASSWORD="$BOOTSTRAP_PASSWORD"
        exec psql -v ON_ERROR_STOP=1 -h "$host" -U opensphere_db_bootstrap -d console -f /scripts/reconcile.sql
      fi
      sleep 3
    done
    echo "Sealed PostgreSQL bootstrap operator is unavailable; a legacy console-superuser installation requires fresh bootstrap" >&2
    exit 1
  reconcile.sql: |
    \set ON_ERROR_STOP on
    \getenv bootstrap_password BOOTSTRAP_PASSWORD
    CREATE EXTENSION IF NOT EXISTS vector;

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opensphere_audit_owner') THEN
        CREATE ROLE opensphere_audit_owner NOLOGIN SUPERUSER NOINHERIT NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS;
      END IF;
    END
    $$;
    SELECT format('CREATE ROLE opensphere_db_bootstrap LOGIN SUPERUSER NOINHERIT NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS PASSWORD %L', :'bootstrap_password')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opensphere_db_bootstrap') \gexec
    SELECT format('ALTER ROLE opensphere_db_bootstrap LOGIN SUPERUSER NOINHERIT NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS PASSWORD %L', :'bootstrap_password')
      WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opensphere_db_bootstrap') \gexec

    CREATE TABLE IF NOT EXISTS public.audit_log (
      id bigserial PRIMARY KEY,
      ts timestamptz NOT NULL DEFAULT now(),
      op_id text,
      source text NOT NULL DEFAULT 'dupa-controller',
      actor text,
      action text,
      target text,
      result text,
      reason text
    );
    ALTER TABLE public.audit_log ADD COLUMN IF NOT EXISTS source text;
    CREATE OR REPLACE FUNCTION public.opensphere_reject_audit_mutation()
      RETURNS trigger LANGUAGE plpgsql AS $$
      BEGIN
        RAISE EXCEPTION 'audit_log is append-only';
      END;
      $$;
    DROP TRIGGER IF EXISTS audit_log_append_only ON public.audit_log;
    UPDATE public.audit_log SET source = 'dupa-controller' WHERE source IS NULL;
    ALTER TABLE public.audit_log ALTER COLUMN source SET DEFAULT 'dupa-controller';
    ALTER TABLE public.audit_log ALTER COLUMN source SET NOT NULL;
    CREATE INDEX IF NOT EXISTS audit_log_ts_idx ON public.audit_log (ts DESC);
    CREATE INDEX IF NOT EXISTS audit_log_actor_idx ON public.audit_log (actor);
    CREATE INDEX IF NOT EXISTS audit_log_source_idx ON public.audit_log (source);
    CREATE INDEX IF NOT EXISTS audit_log_action_idx ON public.audit_log (action);
    CREATE TRIGGER audit_log_append_only
      BEFORE UPDATE OR DELETE ON public.audit_log
      FOR EACH ROW EXECUTE FUNCTION public.opensphere_reject_audit_mutation();

    CREATE TABLE IF NOT EXISTS public.managed_credential (
      kind text NOT NULL,
      credential_id text NOT NULL,
      owner_name text NOT NULL,
      record jsonb NOT NULL,
      created_at timestamptz NOT NULL DEFAULT now(),
      updated_at timestamptz NOT NULL DEFAULT now(),
      last_used_at timestamptz,
      PRIMARY KEY (kind, credential_id),
      CHECK (kind IN ('pat', 'device'))
    );
    CREATE INDEX IF NOT EXISTS managed_credential_owner_idx ON public.managed_credential (owner_name, kind);

    ALTER DATABASE console OWNER TO opensphere_audit_owner;
    ALTER TABLE public.audit_log OWNER TO opensphere_audit_owner;
    ALTER SEQUENCE public.audit_log_id_seq OWNER TO opensphere_audit_owner;
    ALTER FUNCTION public.opensphere_reject_audit_mutation() OWNER TO opensphere_audit_owner;
    ALTER TABLE public.managed_credential OWNER TO opensphere_audit_owner;
    ALTER TABLE public.audit_log ENABLE ALWAYS TRIGGER audit_log_append_only;
    REVOKE ALL ON DATABASE console FROM PUBLIC;
    GRANT CONNECT ON DATABASE console TO console;
    REVOKE CREATE ON SCHEMA public FROM PUBLIC;
    REVOKE ALL ON SCHEMA public FROM console;
    GRANT USAGE ON SCHEMA public TO console;
    REVOKE ALL ON TABLE public.audit_log FROM PUBLIC;
    REVOKE ALL ON TABLE public.managed_credential FROM PUBLIC;
    REVOKE ALL ON SEQUENCE public.audit_log_id_seq FROM PUBLIC;
    GRANT SELECT, INSERT ON TABLE public.audit_log TO console;
    GRANT USAGE, SELECT ON SEQUENCE public.audit_log_id_seq TO console;
    GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.managed_credential TO console;
    ALTER ROLE console NOSUPERUSER INHERIT NOCREATEROLE NOCREATEDB NOREPLICATION NOBYPASSRLS;
---
apiVersion: batch/v1
kind: Job
metadata:
  # A release-revision name makes this one-shot migration idempotent for
  # kubectl apply, while a new immutable release creates its own reconcile Job.
  # Setup substitutes the 40-character Git revision before applying it.
  # Keep the generated controller label below Kubernetes' 63-byte limit:
  # "bb-audit-boundary-" (18 bytes) + a 40-byte Git revision.
  name: bb-audit-boundary-__OPENSPHERE_RELEASE_REVISION__
  namespace: opensphere-backbone
  labels:
    opensphere.io/backbone-module: postgres
    opensphere.io/boundary-reconcile: "true"
    opensphere.io/release-revision: "__OPENSPHERE_RELEASE_REVISION__"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  # Retain the outcome long enough for the serial Kanidm rollout and Setup
  # verifier to consume it; recovery evidence is still cleaned up afterwards.
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        opensphere.io/backbone-module: postgres
        opensphere.io/boundary-reconcile: "true"
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, runAsUser: 70, runAsGroup: 70, fsGroup: 70, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: reconcile
          image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
          imagePullPolicy: IfNotPresent
          command: [sh, /scripts/reconcile.sh]
          env:
            - { name: BOOTSTRAP_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: bootstrap_password } } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: [ALL] } }
          volumeMounts:
            - { name: scripts, mountPath: /scripts, readOnly: true }
            - { name: tls, mountPath: /tls, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: scripts, configMap: { name: backbone-postgres-boundary-reconcile, defaultMode: 365 } }
        - { name: tls, secret: { secretName: backbone-postgres, items: [{ key: ca.crt, path: ca.crt }] } }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backbone-postgres-data
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: { requests: { storage: 8Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backbone-postgres
  namespace: opensphere-backbone
  labels: { app: backbone-postgres, opensphere.io/backbone-module: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: backbone-postgres } }
  template:
    metadata:
      labels: { app: backbone-postgres, opensphere.io/backbone-module: postgres }
    spec:
      serviceAccountName: backbone-postgres
      securityContext: { runAsNonRoot: true, runAsUser: 70, runAsGroup: 70, fsGroup: 70, seccompProfile: { type: RuntimeDefault } }
      initContainers:
        - name: tls-permissions
          image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
          imagePullPolicy: IfNotPresent
          command: [sh, -c, 'cp /source/tls.crt /runtime/tls.crt && cp /source/tls.key /runtime/tls.key && chmod 600 /runtime/tls.key']
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts:
            - { name: tls-source, mountPath: /source, readOnly: true }
            - { name: tls-runtime, mountPath: /runtime }
      containers:
        - name: postgres
          image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
          imagePullPolicy: IfNotPresent
          env:
            - { name: POSTGRES_DB, value: console }
            - { name: POSTGRES_USER, value: opensphere_db_bootstrap }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: bootstrap_password } } }
            - { name: OPENSPHERE_CONSOLE_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: password } } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          args: [postgres, -c, ssl=on, -c, ssl_cert_file=/var/run/postgres-tls/tls.crt, -c, ssl_key_file=/var/run/postgres-tls/tls.key]
          ports: [{ name: postgres, containerPort: 5432 }]
          startupProbe: { exec: { command: [sh, -c, pg_isready -U opensphere_db_bootstrap -d console] }, periodSeconds: 3, failureThreshold: 40 }
          readinessProbe: { exec: { command: [sh, -c, pg_isready -U opensphere_db_bootstrap -d console] }, periodSeconds: 5 }
          livenessProbe: { exec: { command: [sh, -c, pg_isready -U opensphere_db_bootstrap -d console] }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: tls-runtime, mountPath: /var/run/postgres-tls, readOnly: true }
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: backbone-postgres-data } }
        - { name: init, configMap: { name: backbone-postgres-init, defaultMode: 365 } }
        - { name: tmp, emptyDir: {} }
        - { name: tls-source, secret: { secretName: backbone-postgres-tls } }
        - { name: tls-runtime, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: backbone-postgres
  namespace: opensphere-backbone
  labels: { app: backbone-postgres, opensphere.io/backbone-module: postgres }
spec:
  selector: { app: backbone-postgres }
  ports: [{ name: postgres, port: 5432, targetPort: postgres }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: backbone-postgres, namespace: opensphere-backbone }
spec: { minAvailable: 1, selector: { matchLabels: { app: backbone-postgres } } }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backbone-postgres-backup
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres, opensphere.io/recovery: audit }
spec:
  schedule: "17 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 604800
      template:
        metadata: { labels: { app: backbone-postgres-backup, opensphere.io/recovery: audit } }
        spec:
          restartPolicy: OnFailure
          serviceAccountName: backbone-postgres-backup
          automountServiceAccountToken: false
          securityContext: { runAsNonRoot: true, runAsUser: 70, runAsGroup: 70, fsGroup: 70, seccompProfile: { type: RuntimeDefault } }
          containers:
            - name: backup
              image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
              imagePullPolicy: IfNotPresent
              command: [sh, /scripts/backup.sh]
              env:
                - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: password } } }
                - { name: PGSSLMODE, value: verify-full }
                - { name: PGSSLROOTCERT, value: /tls/ca.crt }
                - { name: RUSTFS_ACCESS_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: access_key } } }
                - { name: RUSTFS_SECRET_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: secret_key } } }
                - { name: RUSTFS_ENDPOINT, value: https://backbone-rustfs.opensphere-backbone.svc.cluster.local:9000 }
                - { name: BACKUP_RETENTION_DAYS, value: "30" }
              resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 1, memory: 1Gi } }
              securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: [ALL] } }
              volumeMounts:
                - { name: scripts, mountPath: /scripts, readOnly: true }
                - { name: tmp, mountPath: /tmp }
                - { name: tls, mountPath: /tls, readOnly: true }
          volumes:
            - { name: scripts, configMap: { name: backbone-postgres-backup-scripts, defaultMode: 365 } }
            - { name: tmp, emptyDir: {} }
            - { name: tls, secret: { secretName: backbone-postgres, items: [{ key: ca.crt, path: ca.crt }] } }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backbone-postgres-restore-drill
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: postgres, opensphere.io/recovery: audit }
spec:
  # Setup creates this job explicitly after a backup; it must never restore on a schedule.
  suspend: true
  schedule: "0 0 31 2 *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 604800
      template:
        metadata: { labels: { app: backbone-postgres-restore-drill, opensphere.io/recovery: audit } }
        spec:
          restartPolicy: Never
          serviceAccountName: backbone-postgres-backup
          automountServiceAccountToken: false
          securityContext: { runAsNonRoot: true, runAsUser: 70, runAsGroup: 70, fsGroup: 70, seccompProfile: { type: RuntimeDefault } }
          containers:
            - name: restore-drill
              image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
              imagePullPolicy: IfNotPresent
              command: [sh, /scripts/restore-drill.sh]
              env:
                - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: password } } }
                - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: bootstrap_password } } }
                - { name: PGSSLMODE, value: verify-full }
                - { name: PGSSLROOTCERT, value: /tls/ca.crt }
                - { name: RUSTFS_ACCESS_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: access_key } } }
                - { name: RUSTFS_SECRET_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: secret_key } } }
                - { name: RUSTFS_ENDPOINT, value: https://backbone-rustfs.opensphere-backbone.svc.cluster.local:9000 }
              resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 1, memory: 1Gi } }
              securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: [ALL] } }
              volumeMounts:
                - { name: scripts, mountPath: /scripts, readOnly: true }
                - { name: tmp, mountPath: /tmp }
                - { name: tls, mountPath: /tls, readOnly: true }
          volumes:
            - { name: scripts, configMap: { name: backbone-postgres-backup-scripts, defaultMode: 365 } }
            - { name: tmp, emptyDir: {} }
            - { name: tls, secret: { secretName: backbone-postgres, items: [{ key: ca.crt, path: ca.crt }] } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backbone-rustfs
  namespace: opensphere-backbone
  labels: { app: backbone-rustfs, opensphere.io/backbone-module: rustfs }
spec:
  serviceName: backbone-rustfs
  replicas: 1
  selector: { matchLabels: { app: backbone-rustfs } }
  template:
    metadata:
      labels: { app: backbone-rustfs, opensphere.io/backbone-module: rustfs }
    spec:
      serviceAccountName: backbone-rustfs
      securityContext: { runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: { type: RuntimeDefault } }
      initContainers:
        # RustFS accepts TLS only when the pair has these exact names and is readable
        # by its unprivileged rustfs user. Keep the Secret mount immutable and copy it
        # into a pod-local runtime volume with a mode-0600 private key.
        - name: tls-permissions
          image: opensphere-backbone-rustfs@sha256:ae16738e96b981b958808dd4b84ada2ef60fc1947475aebae1d128a0eb1a7bd3
          imagePullPolicy: IfNotPresent
          command: [sh, -c, 'cp /source/tls.crt /runtime/rustfs_cert.pem && cp /source/tls.key /runtime/rustfs_key.pem && chmod 600 /runtime/rustfs_key.pem']
          securityContext: { runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts:
            - { name: tls-source, mountPath: /source, readOnly: true }
            - { name: tls-runtime, mountPath: /runtime }
      containers:
        - name: rustfs
          image: opensphere-backbone-rustfs@sha256:ae16738e96b981b958808dd4b84ada2ef60fc1947475aebae1d128a0eb1a7bd3
          imagePullPolicy: IfNotPresent
          env:
            - { name: RUSTFS_VOLUMES, value: /data }
            - { name: RUSTFS_ADDRESS, value: 0.0.0.0:9000 }
            - { name: RUSTFS_CONSOLE_ADDRESS, value: 0.0.0.0:9001 }
            - { name: RUSTFS_CONSOLE_ENABLE, value: "true" }
            - { name: RUSTFS_TLS_PATH, value: /var/run/rustfs-tls }
            - { name: RUSTFS_ACCESS_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: access_key } } }
            - { name: RUSTFS_SECRET_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: secret_key } } }
          ports:
            - { name: s3, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          startupProbe: { tcpSocket: { port: s3 }, periodSeconds: 3, failureThreshold: 40 }
          readinessProbe: { tcpSocket: { port: s3 }, periodSeconds: 5 }
          livenessProbe: { tcpSocket: { port: s3 }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: logs, mountPath: /logs }
            - { name: tmp, mountPath: /tmp }
            - { name: tls-runtime, mountPath: /var/run/rustfs-tls, readOnly: true }
      volumes:
        - { name: logs, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
        - { name: tls-source, secret: { secretName: backbone-rustfs-tls } }
        - { name: tls-runtime, emptyDir: {} }
  volumeClaimTemplates:
    - metadata: { name: data, labels: { opensphere.io/backbone-module: rustfs } }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: backbone-rustfs
  namespace: opensphere-backbone
  labels: { app: backbone-rustfs, opensphere.io/backbone-module: rustfs }
spec:
  clusterIP: None
  selector: { app: backbone-rustfs }
  ports:
    - { name: s3, port: 9000, targetPort: s3 }
    - { name: console, port: 9001, targetPort: console }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: backbone-rustfs, namespace: opensphere-backbone }
spec: { minAvailable: 1, selector: { matchLabels: { app: backbone-rustfs } } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backbone-gitea-data
  namespace: opensphere-backbone
  labels: { opensphere.io/backbone-module: gitea }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backbone-gitea
  namespace: opensphere-backbone
  labels: { app: backbone-gitea, opensphere.io/backbone-module: gitea }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: backbone-gitea } }
  template:
    metadata:
      labels: { app: backbone-gitea, opensphere.io/backbone-module: gitea }
    spec:
      serviceAccountName: backbone-gitea
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      initContainers:
        - name: database-init
          image: opensphere-backbone-postgres@sha256:562d7d862b5379141e0658cf90c3b1fb3b126e4fe3c120c9ef05fb81a801f647
          imagePullPolicy: IfNotPresent
          env:
            # Database bootstrap is a short-lived provisioning task. The
            # long-running Console role is deliberately unable to create roles
            # or databases, so it must never be used here.
            - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: backbone-postgres, key: bootstrap_password } } }
            - { name: GITEA_DB_PASSWORD, valueFrom: { secretKeyRef: { name: backbone-gitea, key: db_password } } }
            - { name: PGSSLMODE, value: verify-full }
            - { name: PGSSLROOTCERT, value: /tls/ca.crt }
          command: [sh, -c]
          args:
            - |
              set -eu
              until pg_isready -h backbone-postgres -U opensphere_db_bootstrap -d postgres; do sleep 2; done
              psql -v ON_ERROR_STOP=1 -h backbone-postgres -U opensphere_db_bootstrap -d postgres -v gpass="$GITEA_DB_PASSWORD" <<'SQL'
              SELECT format('CREATE ROLE gitea LOGIN PASSWORD %L', :'gpass') WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname='gitea') \gexec
              SELECT format('ALTER ROLE gitea LOGIN PASSWORD %L', :'gpass') WHERE EXISTS (SELECT FROM pg_roles WHERE rolname='gitea') \gexec
              SELECT 'CREATE DATABASE gitea OWNER gitea' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='gitea') \gexec
              SQL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: postgres-ca, mountPath: /tls, readOnly: true }
      containers:
        - name: gitea
          image: opensphere-backbone-gitea@sha256:a01aa34bb2516cb5c56ae423352dbc20091f94a12a15ee5e8187fc159e3c4e23
          imagePullPolicy: IfNotPresent
          env:
            - { name: GITEA__database__DB_TYPE, value: postgres }
            - { name: GITEA__database__HOST, value: backbone-postgres.opensphere-backbone.svc.cluster.local:5432 }
            - { name: GITEA__database__NAME, value: gitea }
            - { name: GITEA__database__USER, value: gitea }
            - { name: GITEA__database__PASSWD, valueFrom: { secretKeyRef: { name: backbone-gitea, key: db_password } } }
            - { name: GITEA__database__SSL_MODE, value: require }
            - { name: GITEA__security__INSTALL_LOCK, value: "true" }
            - { name: GITEA__server__OFFLINE_MODE, value: "true" }
            - { name: GITEA__server__ROOT_URL, value: http://backbone-gitea.opensphere-backbone.svc.cluster.local:3000/ }
            - { name: GITEA__server__HTTP_PORT, value: "3000" }
            - { name: GITEA__metrics__ENABLED, value: "true" }
            - { name: GITEA__lfs__STORAGE_TYPE, value: minio }
            - { name: GITEA__lfs__MINIO_ENDPOINT, value: backbone-rustfs.opensphere-backbone.svc.cluster.local:9000 }
            - { name: GITEA__lfs__MINIO_ACCESS_KEY_ID, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: access_key } } }
            - { name: GITEA__lfs__MINIO_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: backbone-rustfs, key: secret_key } } }
            - { name: GITEA__lfs__MINIO_BUCKET, value: gitea-lfs }
            - { name: GITEA__lfs__MINIO_LOCATION, value: us-east-1 }
            - { name: GITEA__lfs__MINIO_USE_SSL, value: "true" }
            - { name: SSL_CERT_FILE, value: /etc/ssl/certs/opensphere-ca.crt }
          ports: [{ name: http, containerPort: 3000 }]
          startupProbe: { httpGet: { path: /api/healthz, port: http }, periodSeconds: 5, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /api/healthz, port: http }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /api/healthz, port: http }, periodSeconds: 10, failureThreshold: 6 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /var/lib/gitea }
            - { name: config, mountPath: /etc/gitea }
            - { name: tmp, mountPath: /tmp }
            - { name: postgres-ca, mountPath: /etc/ssl/certs/opensphere-ca.crt, subPath: ca.crt, readOnly: true }
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: backbone-gitea-data } }
        - { name: config, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
        - { name: postgres-ca, secret: { secretName: backbone-postgres, items: [{ key: ca.crt, path: ca.crt }] } }
---
apiVersion: v1
kind: Service
metadata:
  name: backbone-gitea
  namespace: opensphere-backbone
  labels: { app: backbone-gitea, opensphere.io/backbone-module: gitea }
spec:
