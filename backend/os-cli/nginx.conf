# Console native os CLI artifact server. The Main Shell exposes it only through the fixed /api/cli/* route.
server {
    listen 8080;
    server_name _;
    root /srv;
    server_tokens off;

    location = /index.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location / {
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
