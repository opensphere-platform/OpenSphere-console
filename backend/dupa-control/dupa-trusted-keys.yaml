# ════════════════════════════════════════════════════════════════════════════
# dupa-trusted-keys — 플러그인(subShell) 서명 검증용 신뢰 공개키.  ⚠️⚠️ 트러스트 자료 ⚠️⚠️
# ════════════════════════════════════════════════════════════════════════════
# 감사 시정 S3(2026-07-06): placeholder 폐지 — 아래 값은 **라이브 클러스터 실측 정본**(2026-07-06 정렬).
# 공개키(SPKI)는 비밀이 아니므로 리포 정본화가 옳다(리포-라이브 drift 방지). 이 파일 apply = 라이브와
# 동일값 재적용이라 안전해졌다. 단, 값 변경은 여전히 '트러스트 변경'이므로 아래 회전 규칙을 따를 것.
#
# ── 키 회전 규칙 (감사 시정 S3로 명문화) ──────────────────────────────────────
#   1) **회전 = 반드시 새 keyId**(v3, v4, …). keyId 재사용(값 교체) 금지 — 어떤 키로 어떤 플러그인을
#      서명했는지의 추적성이 id로 보장돼야 한다. 옛 keyId는 전 플러그인 재서명 완료 후 항목 제거로 폐기.
#   2) 새 키 도입 절차: (a) 새 keyId+공개키를 이 파일과 라이브 ConfigMap에 '추가'(구키 공존) →
#      (b) 플러그인들을 새 키로 점진 재서명(CR trust.keyId 갱신) → (c) 구 keyId 참조 0건 확인 후 제거.
#   3) 이 파일과 라이브 ConfigMap은 항상 동일해야 한다(변경은 둘 다, 같은 커밋/작업에서).
#
# ── 이력 (감사 규명 기록) ────────────────────────────────────────────────────
#   · 초대 v1 공개키(MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE6i+zGiw43N4nbPkWxcGbrIuaR+1GyBmfBiAoFR3sznS3
#     MmhXSMxldwecUcpr4YnaOsW6UfTBUa0o52cb2dSdcA==)는 개인키 분실로 폐기(2026-06-29 사고 연관).
#   · 당시 재서명하며 keyId 'opensphere-plugins-v1'을 **재사용한 채 값만 교체**(현행 v1 값 ≠ 초대 v1 값)
#     — 2026-07-06 DUPA 기술감사(S3)에서 실측 규명. 규칙 1) 제정 전의 예외로 기록하며, 이후 재발 금지.
#   · 현행: v1(ai·cluster-manager·os·shell-template 서명), v2(foundation 서명) 공존.
#
# 규칙(기존 유지):
#   1) 이 파일은 opensphere-console-dupa-controller.yaml(배포/RBAC)에서 의도적으로 분리됨.
#      배포/RBAC 갱신은 opensphere-console-dupa-controller.yaml만 apply할 것.
#   2) 트러스트 키는 '플러그인을 서명한 개인키에 대응하는 공개키(SPKI base64)'.
#      서명/정렬 도구(install-cluster-manager.sh 등 publish-sign 플로우)와 함께 관리.
#   3) 값 변경은 '트러스트 변경' — 명시적 승인 하에만. (에이전트는 트러스트 변경 차단.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: dupa-trusted-keys
  namespace: opensphere-console
data:
  trusted-keys.json: |
    {
      "trustedKeys": {
        "opensphere-plugins-v1": "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEez09mUpKxAetbTqqktGZJ9MObsK2jFXM+Q8xM1invyK7oMlB2gwHZUtKBFcrev6AK4bWHRHhhoAJz7ukuH/6cA==",
        "opensphere-plugins-v2": "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEh/5jxLrOgGfrKoL5LTzwsjLgwtzebC5w8OCablgADf4GkfwfvOcQpOXIW4nmrSQOlcnszDREj0z15XF69ILX1g=="
      }
    }
