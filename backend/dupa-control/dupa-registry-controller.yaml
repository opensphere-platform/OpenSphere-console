# dupa-registry-controller — 배포 + RBAC (DUPA Admin Control PoC)
# ⚠️ 신뢰키(dupa-trusted-keys ConfigMap)는 이 파일에서 분리됨 → dupa-trusted-keys.yaml.
#    이유: 이 yaml을 RBAC/배포 갱신 목적으로 apply할 때 트러스트 키가 같이 덮어써지면
#    플러그인 서명검증이 깨져 subShell이 전부 안 보이는 사고가 발생함(2026-06-29). 트러스트는 서명/정렬 도구로만 관리.
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
---
# controller는 opensphere-system 안에서만 워크로드/CRD를 조정 (최소권한)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
rules:
  - apiGroups: ["plugins.opensphere.io"]
    # uipluginpackages/finalizers: workload ownerReference의 blockOwnerDeletion=true 설정에 필요
    #   (OwnerReferencesPermissionEnforcement admission이 owner finalizers update 권한을 요구 → 없으면 workload 생성 거부)
    resources: [uipluginpackages, uipluginpackages/finalizers, uipluginregistrations, uipluginregistrations/status]
    # delete: uninstall 시 registration CR 회수 (없으면 CR이 Removed로 잔류 → UX상 '삭제 안 됨')
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, configmaps]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: dupa-registry-controller }
subjects:
  - kind: ServiceAccount
    name: dupa-registry-controller
    namespace: opensphere-system
---
# Backbone 설치 권한(opensphere-backbone) — namespace 생성 + 데이터 티어 워크로드. admin 게이트(verifyActor) 뒤에서만 사용.
# 별도 ClusterRole로 분리(위 least-privilege Role 보존, 권한 명시·감사 용이).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: dupa-backbone-installer }
rules:
  - { apiGroups: [""], resources: [namespaces], verbs: [get, create] }
  # secrets delete: BackboneClaim finalizer GC(테넌트 Secret 회수)에 필요
  - { apiGroups: [""], resources: [secrets, services, persistentvolumeclaims, configmaps, pods], verbs: [get, list, create, patch, delete] }
  - { apiGroups: ["apps"], resources: [deployments, statefulsets], verbs: [get, list, create, patch] }
  # BackboneClaim 할당 컨트롤러 — claim watch/reconcile + status + finalizer
  - { apiGroups: ["backbone.opensphere.io"], resources: [backboneclaims, backboneclaims/status, backboneclaims/finalizers], verbs: [get, list, watch, update, patch] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: dupa-backbone-installer }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: dupa-backbone-installer }
subjects:
  - { kind: ServiceAccount, name: dupa-registry-controller, namespace: opensphere-system }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
  labels: { app: dupa-registry-controller }
spec:
  replicas: 1
  selector: { matchLabels: { app: dupa-registry-controller } }
  template:
    metadata:
      labels: { app: dupa-registry-controller }
    spec:
      serviceAccountName: dupa-registry-controller
      imagePullSecrets: [{ name: ghcr-pull }]
      containers:
        - name: controller
          # 사람용 태그: ghcr.io/opensphere-platform/dupa-registry-controller:0.1.3
          image: ghcr.io/opensphere-platform/dupa-registry-controller@sha256:b5fa84149ff82e04026ff161864974b4ab9f65c6bf194cc165d8e72c191f851a
          env:
            - { name: NAMESPACE, value: opensphere-system }
            # K8s API TLS 검증 — Node fetch(undici)는 시작 시점에 읽으므로 env로 줘야 함
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            # Backbone PostgreSQL(감사로그 영속, ④). 비번은 cross-ns secretKeyRef 불가 →
            #   컨트롤러가 opensphere-backbone/backbone-postgres Secret을 K8s API로 읽어 주입(dupa-backbone-installer RBAC).
            #   값은 코드 기본값과 동일(오버라이드/문서화용). 미설치 시 감사로그는 ConfigMap 폴백.
            - { name: BACKBONE_PG_HOST, value: backbone-postgres.opensphere-backbone.svc.cluster.local }
            - { name: BACKBONE_PG_PORT, value: "5432" }
            - { name: BACKBONE_PG_DB, value: console }
            - { name: BACKBONE_PG_USER, value: console }
            - { name: BACKBONE_PG_SECRET_NS, value: opensphere-backbone }
            - { name: BACKBONE_PG_SECRET, value: backbone-postgres }
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 2 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
  labels: { app: dupa-registry-controller }
spec:
  selector: { app: dupa-registry-controller }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
