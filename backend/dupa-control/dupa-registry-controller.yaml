# dupa-registry-controller ??и«ӣкі лЈ· + RBAC (DUPA Admin Control PoC)
# ?мў‘нҲҳ ?мўҠЛҗ??dupa-trusted-keys ConfigMap)?????лҡҜм”Ә?лЁҜкҪҢ йҒәкҫЁв”Ғ????dupa-trusted-keys.yaml.
#    ?лҢҒм‘Җ: ??yaml??RBAC/и«ӣкі лЈ· еӘӣк№Ҷл–Ҡ п§Ҹв‘№мҹ»?мҮ°мӨҲ apply?????лӘғмңӯ?г…Ҫл“ғ ?г…ә? еӘӣмҲҲм”  ??лјұ?в‘Ҙ?п§Һ?
#    ?лҡ®мңӯжҙ№лӘ„м”Ө ?м’•мұёеҜғп§қм•№м”  жәҗв‘ҘмЎҮ subShell???кҫЁ? ??и№ӮлҢҒм” ???СҲнҖ¬еӘӣ и«ӣм’–к№®??2026-06-29). ?лӘғмңӯ?г…Ҫл“ғ???м’•мұё/?ләЈм № ?кҫ§лҺ„жҝЎм’•мӯ” ж„ҝз”ұ?
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
---
# controller??opensphere-system ?лҚүлҝү?м’•мӯ” ?лҡ°кІ•жҝЎм’•лұ¶/CRDз‘ң?иӯ°кі—м ҷ (п§Өм’–лғјжІ…лҡ°лёі)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
rules:
  - apiGroups: ["plugins.opensphere.io"]
    # uipluginpackages/finalizers: workload ownerReference??blockOwnerDeletion=true ?г…јм ҷ???кҫ©мҠӮ
    #   (OwnerReferencesPermissionEnforcement admission??owner finalizers update жІ…лҡ°лёі???л¶ҪлҺ„ ???лҶҒм‘қп§Һ?workload ?м•№кҪҰ е«„кі•?)
    resources: [uipluginpackages, uipluginpackages/finalizers, uipluginregistrations, uipluginregistrations/status]
    # delete: uninstall ??registration CR ?лҡҜлӢ” (?лҶҒм‘қп§Һ?CR??RemovedжҝЎ??л¶ҫмӘҹ ??UX??'??м Ј ????)
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, configmaps]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: dupa-registry-controller }
subjects:
  - kind: ServiceAccount
    name: dupa-registry-controller
    namespace: opensphere-system
---
# Backbone ?г…јнҠӮ жІ…лҡ°лёі(opensphere-backbone) ??namespace ?м•№кҪҰ + ?кі—м” ???кі—лјұ ?лҡ°кІ•жҝЎм’•лұ¶. admin еҜғлҡҜм” ??verifyActor) ?г…јлҝү?м’•мӯ” ?СҠмҠң.
# и№ӮкҫЁлЈ„ ClusterRoleжҝЎ?йҒәкҫЁв”Ғ(??least-privilege Role и№ӮлҢҒгҖҲ, жІ…лҡ°лёі п§ҸлӮҶл–ҶмЁҢеӘӣлЁҜк¶— ?в‘№м” ).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: dupa-backbone-installer }
rules:
  - { apiGroups: [""], resources: [namespaces], verbs: [get, create] }
  # secrets delete: BackboneClaim finalizer GC(?лҡ®кјі??Secret ?лҡҜлӢ”)???кҫ©мҠӮ
  - { apiGroups: [""], resources: [secrets, services, serviceaccounts, persistentvolumeclaims, configmaps, pods], verbs: [get, list, create, patch, delete] }
  - { apiGroups: ["apps"], resources: [deployments, statefulsets], verbs: [get, list, create, patch] }
  - { apiGroups: ["rbac.authorization.k8s.io"], resources: [roles, rolebindings], verbs: [get, list, create, patch, delete] }
  # BackboneClaim ?мўҠл–Ұ иҖҢв‘Ұл“ғжҝЎг…»мңӯ ??claim watch/reconcile + status + finalizer
  - { apiGroups: ["backbone.opensphere.io"], resources: [backboneclaims, backboneclaims/status, backboneclaims/finalizers], verbs: [get, list, watch, update, patch] }
  # Observability ?ләЈлӮ« й…ү???ServiceMonitor ?лӘғк№Ҫ?мўҠв”Ғ ?мҺ„лҰ°(monitoring ns ?лҡ®лұ¶/?м’•нү¬?г…»л’— ??core жҙ№м’–нҠғ?мҮ°мӨҲ иҖҢг…»мҫӯ).
  - { apiGroups: ["monitoring.coreos.com"], resources: [servicemonitors], verbs: [get, list] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: dupa-backbone-installer }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: dupa-backbone-installer }
subjects:
  - { kind: ServiceAccount, name: dupa-registry-controller, namespace: opensphere-system }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
  labels: { app: dupa-registry-controller }
spec:
  replicas: 1
  selector: { matchLabels: { app: dupa-registry-controller } }
  template:
    metadata:
      labels: { app: dupa-registry-controller }
    spec:
      serviceAccountName: dupa-registry-controller
      imagePullSecrets: [{ name: ghcr-pull }]
      containers:
        - name: controller
          # Local development registry image. Replace with a signed remote digest for production promotion.
          image: ghcr.io/opensphere-platform/dupa-registry-controller@sha256:10b09d8e8246039fb547f33fd5ce12983b7a669b3f7834c72b89176b141f260c
          env:
            - { name: NAMESPACE, value: opensphere-system }
            # K8s API TLS еҜғп§қ???Node fetch(undici)???м’–мҳү ?м’–м Ҹ???мҺҢм‘қиӘҳжҝЎ?envжҝЎ?д»Ҙм„Ҹл№һ ??
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            # Backbone PostgreSQL(еӘӣлЁҜк¶—жҝЎм’“л Ү ?кіёлғҪ, ??. йҚ®кҫЁмҫІ? cross-ns secretKeyRef йҒәлҚҮ? ??
            #   иҖҢв‘Ұл“ғжҝЎг…»мңӯеӘӣ opensphere-backbone/backbone-postgres Secret??K8s APIжҝЎ??мҺҢлјұ дәҢмҮұм—Ҝ(dupa-backbone-installer RBAC).
            #   еӘӣлҜӘ? иӮ„л¶ҫлұ¶ ж№Ікі•лӮҜеӘӣлҜЁлӮө ?мҲҲм”Ә(?г…»мҫӯ?мҮұм” ??иҮҫлӘ„кҪҢ?л¶ҝмҠң). иӘҳлӘ„кҪ•з§»???еӘӣлЁҜк¶—жҝЎм’“л Ү??ConfigMap ?лҢҖк°ҡ.
            - { name: BACKBONE_PG_HOST, value: backbone-postgres.opensphere-backbone.svc.cluster.local }
            - { name: BACKBONE_PG_PORT, value: "5432" }
            - { name: BACKBONE_PG_DB, value: console }
            - { name: BACKBONE_PG_USER, value: console }
            - { name: BACKBONE_PG_SECRET_NS, value: opensphere-backbone }
            - { name: BACKBONE_PG_SECRET, value: backbone-postgres }
            # Backbone RustFS(S3) ??BackboneClaim objectStore ?мўҠл–Ұ(иё°кҫӘк¶Ҙ ?м•№кҪҰ + ?лҡ®кјі??Secret).
            #   ?лӘ„л’Ә?лҢҒл’Ә ?г…»л’— иҖҢв‘Ұл“ғжҝЎг…»мңӯеӘӣ opensphere-backbone/backbone-rustfs Secret??K8s APIжҝЎ??мҺҢм“¬(dupa-backbone-installer RBAC).
            #   еӘӣлҜӘ? иӮ„л¶ҫлұ¶ ж№Ікі•лӮҜеӘӣлҜЁлӮө ?мҲҲм”Ә(?г…»мҫӯ?мҮұм” ??иҮҫлӘ„кҪҢ?л¶ҝмҠң). иӘҳлӘ„кҪ•з§»???objectStore??Pending.
            - { name: BACKBONE_S3_ENDPOINT, value: http://backbone-rustfs.opensphere-backbone.svc.cluster.local:9000 }
            - { name: BACKBONE_S3_REGION, value: us-east-1 }
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 2 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: dupa-registry-controller
  namespace: opensphere-system
  labels: { app: dupa-registry-controller }
spec:
  selector: { app: dupa-registry-controller }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
