#    ?댁쑀: ??yaml??RBAC/諛고룷 媛깆떊 紐⑹쟻?쇰줈 apply?????몃윭?ㅽ듃 ?ㅺ? 媛숈씠 ??뼱?⑥?硫?
#    ?뚮윭洹몄씤 ?쒕챸寃利앹씠 源⑥졇 subShell???꾨? ??蹂댁씠???ш퀬媛 諛쒖깮??2026-06-29). ?몃윭?ㅽ듃???쒕챸/?뺣젹 ?꾧뎄濡쒕쭔 愿由?
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-console
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
---
# controller??opensphere-console ?덉뿉?쒕쭔 ?뚰겕濡쒕뱶/CRD瑜?議곗젙 (理쒖냼沅뚰븳)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
rules:
  - apiGroups: ["plugins.opensphere.io"]
    # uipluginpackages/finalizers: workload ownerReference??blockOwnerDeletion=true ?ㅼ젙???꾩슂
    #   (OwnerReferencesPermissionEnforcement admission??owner finalizers update 沅뚰븳???붽뎄 ???놁쑝硫?workload ?앹꽦 嫄곕?)
    resources: [uipluginpackages, uipluginpackages/finalizers, uipluginregistrations, uipluginregistrations/status]
    # delete: uninstall ??registration CR ?뚯닔 (?놁쑝硫?CR??Removed濡??붾쪟 ??UX??'??젣 ????)
    verbs: [get, list, watch, create, update, patch, delete]
  # Main Shell-owned lifecycle declaration/evidence between HIS and PFS.
  - apiGroups: ["platform.opensphere.io"]
    resources: [platformsupportprofiles, platformsupportprofiles/status]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, serviceaccounts, configmaps, secrets, pods]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-dupa-controller }
subjects:
  - kind: ServiceAccount
    name: opensphere-console-dupa-controller
    namespace: opensphere-console
---
# Console-wide evidence is read-only.  Runtime mutation is constrained to the
# namespace Role above; no data-stack installer or claim reconciler exists.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: dupa-console-evidence-reader }
rules:
  - { apiGroups: [""], resources: [namespaces], verbs: [get, list] }
  - { apiGroups: ["config.opensphere.io"], resources: [platformconfigs], verbs: [get, list] }
  - { apiGroups: ["platform.opensphere.io"], resources: [platformversions], verbs: [get, list] }
  - { apiGroups: ["networking.k8s.io"], resources: [networkpolicies], verbs: [get, list] }
  - { apiGroups: ["admissionregistration.k8s.io"], resources: [validatingwebhookconfigurations], verbs: [get, list] }
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: [validatingadmissionpolicies, validatingadmissionpolicybindings]
    resourceNames:
      - opensphere-console-manual-ui-contract
      - opensphere-console-image-integrity-workload
      - opensphere-console-image-integrity-cronjob
    verbs: [get]
  - { apiGroups: ["rbac.authorization.k8s.io"], resources: [clusterrolebindings], verbs: [get, list] }
  - { apiGroups: ["observability.opensphere.io"], resources: [observabilitybindings], verbs: [get, list] }
  - { apiGroups: ["authentication.k8s.io"], resources: [tokenreviews], verbs: [create] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: dupa-console-evidence-reader }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: dupa-console-evidence-reader }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-dupa-controller, namespace: opensphere-console }
---
# 승인된 module permission profile은 설치 시 고정 생성한다. Controller가 ClusterRole을 생성하지 않아
# Kubernetes privilege-escalation admission 경계를 우회하지 않는다.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensphere-module-cluster-observer-v1
  labels: { opensphere.io/managed-by: dupa }
rules:
  - { apiGroups: [""], resources: [namespaces, nodes, pods, pods/log, services, endpoints, persistentvolumeclaims, persistentvolumes, events, configmaps, limitranges, resourcequotas, serviceaccounts, replicationcontrollers], verbs: [get, list, watch] }
  - { apiGroups: [apps], resources: [deployments, daemonsets, statefulsets, replicasets, controllerrevisions], verbs: [get, list, watch] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, list, watch] }
  - { apiGroups: [storage.k8s.io], resources: [storageclasses, csidrivers, csinodes, volumeattachments], verbs: [get, list, watch] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies, ingressclasses], verbs: [get, list, watch] }
  - { apiGroups: [discovery.k8s.io], resources: [endpointslices], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling.k8s.io], resources: [verticalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, list, watch] }
  - { apiGroups: [scheduling.k8s.io], resources: [priorityclasses], verbs: [get, list, watch] }
  - { apiGroups: [node.k8s.io], resources: [runtimeclasses], verbs: [get, list, watch] }
  - { apiGroups: [coordination.k8s.io], resources: [leases], verbs: [get, list, watch] }
  - { apiGroups: [rbac.authorization.k8s.io], resources: [roles, rolebindings, clusterroles, clusterrolebindings], verbs: [get, list, watch] }
  - { apiGroups: [apiextensions.k8s.io], resources: [customresourcedefinitions], verbs: [get, list, watch] }
  - { apiGroups: [metrics.k8s.io], resources: [nodes, pods], verbs: [get, list] }
  - { apiGroups: [jobset.x-k8s.io], resources: [jobsets], verbs: [get, list, watch] }
  - { apiGroups: [cert-manager.io], resources: [issuers, clusterissuers, certificates, certificaterequests], verbs: [get, list, watch] }
  - { apiGroups: [acme.cert-manager.io], resources: [challenges, orders], verbs: [get, list, watch] }
  - apiGroups: [kubevirt.io, subresources.kubevirt.io, cdi.kubevirt.io, instancetype.kubevirt.io, migrations.kubevirt.io, snapshot.storage.k8s.io, forklift.konveyor.io, ceph.rook.io, template.openshift.io, fleet.opensphere.io, cluster.open-cluster-management.io]
    resources: ["*"]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensphere-module-cluster-infrastructure-manager-v1
  labels: { opensphere.io/managed-by: dupa }
rules:
  # Console-side storage integration only. HIS lifecycle is never delegated
  # through a Console module permission profile.
  - { apiGroups: [""], resources: [namespaces, nodes, pods, pods/log, services, endpoints, persistentvolumeclaims, persistentvolumes, events, configmaps, limitranges, resourcequotas, serviceaccounts, replicationcontrollers], verbs: [get, list, watch] }
  - { apiGroups: [apps], resources: [deployments, daemonsets, statefulsets, replicasets, controllerrevisions], verbs: [get, list, watch] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, list, watch] }
  - { apiGroups: [storage.k8s.io], resources: [storageclasses, csidrivers, csinodes, volumeattachments], verbs: [get, list, watch] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies, ingressclasses], verbs: [get, list, watch] }
  - { apiGroups: [discovery.k8s.io], resources: [endpointslices], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling.k8s.io], resources: [verticalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, list, watch] }
  - { apiGroups: [scheduling.k8s.io], resources: [priorityclasses], verbs: [get, list, watch] }
  - { apiGroups: [node.k8s.io], resources: [runtimeclasses], verbs: [get, list, watch] }
  - { apiGroups: [coordination.k8s.io], resources: [leases], verbs: [get, list, watch] }
  - { apiGroups: [rbac.authorization.k8s.io], resources: [roles, rolebindings, clusterroles, clusterrolebindings], verbs: [get, list, watch] }
  - { apiGroups: [apiextensions.k8s.io], resources: [customresourcedefinitions], verbs: [get, list, watch] }
  - { apiGroups: [metrics.k8s.io], resources: [nodes, pods], verbs: [get, list] }
  - { apiGroups: [jobset.x-k8s.io], resources: [jobsets], verbs: [get, list, watch] }
  - { apiGroups: [cert-manager.io], resources: [issuers, clusterissuers, certificates, certificaterequests], verbs: [get, list, watch] }
  - { apiGroups: [acme.cert-manager.io], resources: [challenges, orders], verbs: [get, list, watch] }
  - apiGroups: [kubevirt.io, subresources.kubevirt.io, cdi.kubevirt.io, instancetype.kubevirt.io, migrations.kubevirt.io, snapshot.storage.k8s.io, forklift.konveyor.io, ceph.rook.io, template.openshift.io, fleet.opensphere.io, cluster.open-cluster-management.io]
    resources: ["*"]
    verbs: [get, list, watch]
  - { apiGroups: [storage.k8s.io], resources: [storageclasses], verbs: [get, list, watch, create, update, patch, delete] }
  - { apiGroups: [snapshot.storage.k8s.io], resources: [volumesnapshotclasses], verbs: [get, list, watch, create, update, patch, delete] }
  - { apiGroups: [snapshot.storage.k8s.io], resources: [volumesnapshots], verbs: [get, list, watch, create, update, patch, delete] }
  - { apiGroups: [ceph.rook.io, csi.ceph.io], resources: ["*"], verbs: [get, list, watch, create, update, patch, delete] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: dupa-module-profile-installer }
rules:
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    resourceNames: [opensphere-module-cluster-observer-v1, opensphere-module-cluster-infrastructure-manager-v1]
    verbs: [get, bind]
  - { apiGroups: [rbac.authorization.k8s.io], resources: [clusterrolebindings], verbs: [get, list, create, patch, delete] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: dupa-module-profile-installer }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: dupa-module-profile-installer }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-dupa-controller, namespace: opensphere-console }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
  labels: { app: opensphere-console-dupa-controller }
spec:
  replicas: 2
  selector: { matchLabels: { app: opensphere-console-dupa-controller } }
  template:
    metadata:
      labels: { app: opensphere-console-dupa-controller }
    spec:
      serviceAccountName: opensphere-console-dupa-controller
      imagePullSecrets: [{ name: opensphere-ghcr-pull }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: controller
          # edge is released as an immutable GHCR digest. A local override must also
          # satisfy the managed-workload image-integrity admission policy.
          image: ghcr.io/opensphere-platform/opensphere-console-dupa-controller@sha256:54df98942e155e030e9d2fd64eac0b8dd0e6db8cdf1371ff4b814a3681486f60
          imagePullPolicy: Always
          env:
            - { name: NAMESPACE, value: opensphere-console }
            # Production is fail-closed. Development override requires both values explicitly.
            - { name: OPENSPHERE_RUNTIME_MODE, value: production }
            - { name: FOUNDATION_ACTIVATION_DEV_OVERRIDE, value: "false" }
            # K8s API TLS 寃利???Node fetch(undici)???쒖옉 ?쒖젏???쎌쑝誘濡?env濡?以섏빞 ??
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            # GitHub attestation verification uses only this writable cache; the image root remains read-only.
            - { name: HOME, value: /tmp/gh-home }
            - { name: GH_CONFIG_DIR, value: /tmp/gh-config }
            # Supabase audit is the controller's only durable data authority.
            # 모든 Console 권한은 Supabase-backed Console identity service가 단일 검증한다.
            - { name: CONSOLE_IDENTITY_URL, value: http://opensphere-console-backend.opensphere-console.svc.cluster.local:8080 }
            - { name: CONSOLE_ADMIN_GROUP, value: console-admins }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: SUPABASE_REST_URL, value: http://opensphere-supabase-rest.opensphere-console-data.svc.cluster.local:3000 }
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom: { secretKeyRef: { name: opensphere-supabase-runtime, key: service-role-key } }
          volumeMounts:
            # Optional private GHCR access. Standard kubernetes.io/dockerconfigjson Secret;
            # credentials are consumed as a file and never projected into process environment.
            - { name: opensphere-ghcr, mountPath: /var/run/secrets/opensphere-ghcr, readOnly: true }
            # Lifecycle generation is non-secret state.  It is projected independently so a
            # replica can prove its Secret mount is at the same generation before use.
            - { name: opensphere-ghcr-state, mountPath: /var/run/secrets/opensphere-ghcr-state, readOnly: true }
            - { name: verifier-tmp, mountPath: /tmp }
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 2, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: opensphere-ghcr
          secret:
            secretName: opensphere-ghcr-pull
            optional: true
            items: [{ key: .dockerconfigjson, path: config.json }]
        - name: opensphere-ghcr-state
          configMap:
            name: opensphere-ghcr-credential-state
            optional: true
        - name: verifier-tmp
          emptyDir: { sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
  labels: { app: opensphere-console-dupa-controller }
spec:
  # Data & Identity authority 장애 시에도 소비자가 Controller의 명시적 503 응답을 받아
  # 연결 타임아웃/모호한 5xx로 상태를 오인하지 않도록 한다.
  publishNotReadyAddresses: true
  selector: { app: opensphere-console-dupa-controller }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
