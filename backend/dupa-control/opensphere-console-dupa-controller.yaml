# opensphere-console-dupa-controller ??諛고룷 + RBAC (DUPA Admin Control PoC)
# ?좑툘 ?좊ː??dupa-trusted-keys ConfigMap)?????뚯씪?먯꽌 遺꾨━????dupa-trusted-keys.yaml.
#    ?댁쑀: ??yaml??RBAC/諛고룷 媛깆떊 紐⑹쟻?쇰줈 apply?????몃윭?ㅽ듃 ?ㅺ? 媛숈씠 ??뼱?⑥?硫?
#    ?뚮윭洹몄씤 ?쒕챸寃利앹씠 源⑥졇 subShell???꾨? ??蹂댁씠???ш퀬媛 諛쒖깮??2026-06-29). ?몃윭?ㅽ듃???쒕챸/?뺣젹 ?꾧뎄濡쒕쭔 愿由?
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-console
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
---
# controller??opensphere-console ?덉뿉?쒕쭔 ?뚰겕濡쒕뱶/CRD瑜?議곗젙 (理쒖냼沅뚰븳)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
rules:
  - apiGroups: ["plugins.opensphere.io"]
    # uipluginpackages/finalizers: workload ownerReference??blockOwnerDeletion=true ?ㅼ젙???꾩슂
    #   (OwnerReferencesPermissionEnforcement admission??owner finalizers update 沅뚰븳???붽뎄 ???놁쑝硫?workload ?앹꽦 嫄곕?)
    resources: [uipluginpackages, uipluginpackages/finalizers, uipluginregistrations, uipluginregistrations/status]
    # delete: uninstall ??registration CR ?뚯닔 (?놁쑝硫?CR??Removed濡??붾쪟 ??UX??'??젣 ????)
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, serviceaccounts, configmaps]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-dupa-controller }
subjects:
  - kind: ServiceAccount
    name: opensphere-console-dupa-controller
    namespace: opensphere-console
---
# Backbone ?ㅼ튂 沅뚰븳(opensphere-backbone) ??namespace ?앹꽦 + ?곗씠???곗뼱 ?뚰겕濡쒕뱶. admin 寃뚯씠??verifyActor) ?ㅼ뿉?쒕쭔 ?ъ슜.
# 蹂꾨룄 ClusterRole濡?遺꾨━(??least-privilege Role 蹂댁〈, 沅뚰븳 紐낆떆쨌媛먯궗 ?⑹씠).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: dupa-backbone-installer }
rules:
  - { apiGroups: [""], resources: [namespaces], verbs: [get, create] }
  # secrets delete: BackboneClaim finalizer GC(?뚮꼳??Secret ?뚯닔)???꾩슂
  - { apiGroups: [""], resources: [secrets, services, serviceaccounts, persistentvolumeclaims, configmaps, pods], verbs: [get, list, create, patch, delete] }
  - { apiGroups: ["apps"], resources: [deployments, statefulsets], verbs: [get, list, create, patch] }
  - { apiGroups: ["rbac.authorization.k8s.io"], resources: [roles, rolebindings], verbs: [get, list, create, patch, delete] }
  # BackboneClaim ?좊떦 而⑦듃濡ㅻ윭 ??claim watch/reconcile + status + finalizer
  - { apiGroups: ["backbone.opensphere.io"], resources: [backboneclaims, backboneclaims/status, backboneclaims/finalizers], verbs: [get, list, watch, update, patch] }
  # Console-native os CLI read-only resource plane. Controller code applies an
  # additional exact path allowlist and accepts GET only.
  - { apiGroups: ["config.opensphere.io"], resources: [platformconfigs], verbs: [get, list] }
  - { apiGroups: ["platform.opensphere.io"], resources: [platformversions], verbs: [get, list] }
  # Observability ?뺣낫 酉???ServiceMonitor ?몃깽?좊━ ?쎄린(monitoring ns ?뚮뱶/?쒕퉬?ㅻ뒗 ??core 洹쒖튃?쇰줈 而ㅻ쾭).
  - { apiGroups: ["monitoring.coreos.com"], resources: [servicemonitors], verbs: [get, list] }
  # Workload event identity: projected ServiceAccount token validation (shared service secret 금지).
  - { apiGroups: ["authentication.k8s.io"], resources: [tokenreviews], verbs: [create] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: dupa-backbone-installer }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: dupa-backbone-installer }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-dupa-controller, namespace: opensphere-console }
---
# 승인된 module permission profile은 설치 시 고정 생성한다. Controller가 ClusterRole을 생성하지 않아
# Kubernetes privilege-escalation admission 경계를 우회하지 않는다.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensphere-module-cluster-observer-v1
  labels: { opensphere.io/managed-by: dupa }
rules:
  - { apiGroups: [""], resources: [namespaces, nodes, pods, pods/log, services, endpoints, persistentvolumeclaims, persistentvolumes, events, configmaps, limitranges, resourcequotas, serviceaccounts, replicationcontrollers], verbs: [get, list, watch] }
  - { apiGroups: [apps], resources: [deployments, daemonsets, statefulsets, replicasets, controllerrevisions], verbs: [get, list, watch] }
  - { apiGroups: [batch], resources: [jobs, cronjobs], verbs: [get, list, watch] }
  - { apiGroups: [storage.k8s.io], resources: [storageclasses, csidrivers, csinodes, volumeattachments], verbs: [get, list, watch] }
  - { apiGroups: [networking.k8s.io], resources: [ingresses, networkpolicies, ingressclasses], verbs: [get, list, watch] }
  - { apiGroups: [discovery.k8s.io], resources: [endpointslices], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling], resources: [horizontalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [autoscaling.k8s.io], resources: [verticalpodautoscalers], verbs: [get, list, watch] }
  - { apiGroups: [policy], resources: [poddisruptionbudgets], verbs: [get, list, watch] }
  - { apiGroups: [scheduling.k8s.io], resources: [priorityclasses], verbs: [get, list, watch] }
  - { apiGroups: [node.k8s.io], resources: [runtimeclasses], verbs: [get, list, watch] }
  - { apiGroups: [coordination.k8s.io], resources: [leases], verbs: [get, list, watch] }
  - { apiGroups: [rbac.authorization.k8s.io], resources: [roles, rolebindings, clusterroles, clusterrolebindings], verbs: [get, list, watch] }
  - { apiGroups: [apiextensions.k8s.io], resources: [customresourcedefinitions], verbs: [get, list, watch] }
  - { apiGroups: [metrics.k8s.io], resources: [nodes, pods], verbs: [get, list] }
  - { apiGroups: [jobset.x-k8s.io], resources: [jobsets], verbs: [get, list, watch] }
  - apiGroups: [kubevirt.io, subresources.kubevirt.io, cdi.kubevirt.io, instancetype.kubevirt.io, migrations.kubevirt.io, snapshot.storage.k8s.io, forklift.konveyor.io, monitoring.coreos.com, ceph.rook.io, template.openshift.io, fleet.opensphere.io, cluster.open-cluster-management.io]
    resources: ["*"]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: dupa-module-profile-installer }
rules:
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    resourceNames: [opensphere-module-cluster-observer-v1]
    verbs: [get, bind]
  - { apiGroups: [rbac.authorization.k8s.io], resources: [clusterrolebindings], verbs: [get, list, create, patch, delete] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: dupa-module-profile-installer }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: dupa-module-profile-installer }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-dupa-controller, namespace: opensphere-console }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
  labels: { app: opensphere-console-dupa-controller }
spec:
  replicas: 2
  selector: { matchLabels: { app: opensphere-console-dupa-controller } }
  template:
    metadata:
      labels: { app: opensphere-console-dupa-controller }
    spec:
      serviceAccountName: opensphere-console-dupa-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: controller
          # 정본(릴리스): GHCR 이미지(NAMING-STANDARD §1·§4). 로컬 kind는 로컬 태그로 override(kubectl set image / overlay, §5).
          # push 후 §6 BOM에서 ghcr.io/opensphere-platform/opensphere-console-dupa-controller@sha256:<digest>로 고정.
          image: ghcr.io/opensphere-platform/opensphere-console-dupa-controller:2.0.0-rc.1
          imagePullPolicy: IfNotPresent
          env:
            - { name: NAMESPACE, value: opensphere-console }
            # K8s API TLS 寃利???Node fetch(undici)???쒖옉 ?쒖젏???쎌쑝誘濡?env濡?以섏빞 ??
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            # Backbone PostgreSQL(媛먯궗濡쒓렇 ?곸냽, ??. 鍮꾨쾲? cross-ns secretKeyRef 遺덇? ??
            #   而⑦듃濡ㅻ윭媛 opensphere-backbone/backbone-postgres Secret??K8s API濡??쎌뼱 二쇱엯(dupa-backbone-installer RBAC).
            #   媛믪? 肄붾뱶 湲곕낯媛믨낵 ?숈씪(?ㅻ쾭?쇱씠??臾몄꽌?붿슜). 誘몄꽕移???媛먯궗濡쒓렇??ConfigMap ?대갚.
            - { name: BACKBONE_PG_HOST, value: backbone-postgres.opensphere-backbone.svc.cluster.local }
            - { name: BACKBONE_PG_PORT, value: "5432" }
            - { name: BACKBONE_PG_DB, value: console }
            - { name: BACKBONE_PG_USER, value: console }
            - { name: BACKBONE_PG_SECRET_NS, value: opensphere-backbone }
            - { name: BACKBONE_PG_SECRET, value: backbone-postgres }
            # Backbone RustFS(S3) ??BackboneClaim objectStore ?좊떦(踰꾪궥 ?앹꽦 + ?뚮꼳??Secret).
            #   ?몄뒪?댁뒪 ?ㅻ뒗 而⑦듃濡ㅻ윭媛 opensphere-backbone/backbone-rustfs Secret??K8s API濡??쎌쓬(dupa-backbone-installer RBAC).
            #   媛믪? 肄붾뱶 湲곕낯媛믨낵 ?숈씪(?ㅻ쾭?쇱씠??臾몄꽌?붿슜). 誘몄꽕移???objectStore??Pending.
            - { name: BACKBONE_S3_ENDPOINT, value: http://backbone-rustfs.opensphere-backbone.svc.cluster.local:9000 }
            - { name: BACKBONE_S3_REGION, value: us-east-1 }
            # Kanidm id_token 발급자(iss) 검증값 — 도메인 운영 전환(auth.console.opensphere.dev) 반영.
            - { name: KANIDM_ISSUERS, value: "https://localhost:8444/oauth2/openid/opensphere-console,https://auth.console.opensphere.dev/oauth2/openid/opensphere-console" }
            - { name: KANIDM_JWKS_URL, value: "https://opensphere-console-auth.opensphere-console.svc:8443/oauth2/openid/opensphere-console/public_key.jwk" }
            - { name: KANIDM_CA_PATH, value: /etc/kanidm-ca/ca.crt }
            # BFF 발급 PAT는 매 요청 서버측 상태 검사. 폐기 후 서명 만료까지 살아남는 우회를 금지한다.
            - { name: TOKEN_INTROSPECTION_URL, value: https://opensphere-console-auth.opensphere-console.svc:8443/bff/pat/introspect }
            - { name: TOKEN_INTROSPECTION_SERVERNAME, value: kanidm.opensphere-console-auth.svc }
          volumeMounts:
            - { name: kanidm-ca, mountPath: /etc/kanidm-ca, readOnly: true }
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 2, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: kanidm-ca
          secret:
            secretName: opensphere-console-auth-ca
            items: [{ key: ca.crt, path: ca.crt }]
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-console-dupa-controller
  namespace: opensphere-console
  labels: { app: opensphere-console-dupa-controller }
spec:
  # Backbone 장애 시에도 소비자가 Controller의 명시적 503 응답을 받아
  # 연결 타임아웃/모호한 5xx로 상태를 오인하지 않도록 한다.
  publishNotReadyAddresses: true
  selector: { app: opensphere-console-dupa-controller }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
