# platform-status를 Admin Control(ns opensphere-system)로 이전 시, controller가 띄운
# 파드(default SA)가 OpenSphere CR을 읽도록 기존 reader ClusterRole을 바인딩.
# [PoC 한계] ns opensphere-system default SA에 cluster CR read 부여 — 제품화 시
# UIPluginPackage에 전용 SA 선언 + controller가 최소권한 SA/binding 생성으로 승격.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensphere-status-reader-system
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: opensphere-status-reader }
subjects:
  - kind: ServiceAccount
    name: default
    namespace: opensphere-system
