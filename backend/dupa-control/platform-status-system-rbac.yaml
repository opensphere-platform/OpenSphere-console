# platform-status 전용 workload identity에 OpenSphere CR 읽기 권한을 바인딩한다.
apiVersion: v1
kind: ServiceAccount
metadata: { name: opensphere-platform-status, namespace: opensphere-console }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensphere-status-reader-system
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: opensphere-status-reader }
subjects:
  - kind: ServiceAccount
    name: opensphere-platform-status
    namespace: opensphere-console
