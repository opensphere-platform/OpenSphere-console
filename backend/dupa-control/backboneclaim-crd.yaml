# BackboneClaim — 소비자(OAH 등)가 Backbone 논리자원을 '선언적으로 요청'하는 CRD.
# 할당 책임 = dupa-registry-controller의 reconciler(claim watch → 프로비저닝 + Secret 발급 + status 바인딩 + finalizer GC).
# claim은 소비자 NS에 생성 → 결과 Secret이 같은 NS에 생겨 secretKeyRef로 소비 가능. docs/BACKBONE-ARCHITECTURE.md §1.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backboneclaims.backbone.opensphere.io
spec:
  group: backbone.opensphere.io
  scope: Namespaced
  names:
    kind: BackboneClaim
    plural: backboneclaims
    singular: backboneclaim
    shortNames: [bbc]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: DB, type: string, jsonPath: .status.postgres.database }
        - { name: Bucket, type: string, jsonPath: .status.objectStore.bucket }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                postgres:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                    # DB/role 이름 — PG 식별자 규칙(소문자/숫자/언더스코어). 미지정 시 claim 이름(하이픈→언더스코어).
                    database: { type: string, pattern: '^[a-z_][a-z0-9_]{0,62}$' }
                    # 선택 사항. 기본 true 의미로 provider가 <claim>-backbone-postgres-app Secret을 함께 발급한다.
                    # username 생략 시 기존 app Secret username을 재사용하고, 없으면 <database>_app.
                    appRole:
                      type: object
                      properties:
                        enabled: { type: boolean, default: true }
                        username: { type: string, pattern: '^[a-z_][a-z0-9_]{0,62}$' }
                objectStore:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                    bucket: { type: string, pattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$' }
                gitOps:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                    org: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
