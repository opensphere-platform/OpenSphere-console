# DUPA Admin Control — 등록처 CRD (CONSTITUTION-0003 Host Contract + 통합 선언)
# UIPluginPackage     : 설치 가능 catalog (관리자 통제 — manifestSha256/signature/keyId가 신뢰 루트)
# UIPluginRegistration: 설치 상태/desired state (Admin이 이걸 바꾸고 controller가 reconcile)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: uipluginpackages.plugins.opensphere.io
spec:
  group: plugins.opensphere.io
  scope: Namespaced
  names:
    kind: UIPluginPackage
    plural: uipluginpackages
    singular: uipluginpackage
    shortNames: [uipkg]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [displayName, image, manifest, trust, kind, hostRef, hostCompat, contributions]
              properties:
                displayName: { type: string }
                owner: { type: string }
                version: { type: string }
                description: { type: string }
                # 공식 위계 계약 — Registry·signed manifest·runtime Host가 동일하게 보존한다.
                kind:
                  type: string
                  enum: [subShell, plugin]
                hostRef:
                  type: string
                  pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'
                hostApiVersion: { type: string }
                hostCompat: { type: string }
                serviceAccountName:
                  type: string
                  pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'
                podLabels:
                  type: object
                  additionalProperties:
                    type: string
                env:
                  type: array
                  items:
                    type: object
                    required: [name, value]
                    properties:
                      name:
                        type: string
                        pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
                      value: { type: string }
                image:
                  type: object
                  required: [repository, digest]
                  properties:
                    repository: { type: string }
                    # 감사 시정 S1(2026-07-06): 불변 digest 필수 — 태그 금지(공급망 보증).
                    # controller reconcile도 sha256: 미접두를 Failed/InvalidDigest로 거부(이중 방어).
                    digest:
                      type: string
                      pattern: '^sha256:[a-f0-9]{64}$'
                nav:
                  type: object
                  properties:
                    band: { type: string }
                    label: { type: string }
                    icon: { type: string }   # 1단 아이콘(Carbon 토큰명, 관리자 오버라이드)
                manifest:
                  type: object
                  required: [path, sha256]
                  properties:
                    path: { type: string }     # 컨테이너 내 서빙 경로 (/plugins/...)
                    sha256: { type: string }    # 승인된 manifest digest → registry manifestSha256
                    signaturePath: { type: string }
                # 신뢰 루트 — 관리자 승인값 (검토 §B.5: controller는 계산해 비교만, 이 값을 전사)
                trust:
                  type: object
                  required: [keyId]
                  properties:
                    keyId: { type: string }
                shellCompat: { type: string }   # semver range, 예 ">=0.2.0 <0.4.0"
                permissionProfile:
                  type: string
                  enum: [none, cluster-observer-v1, cluster-his-manager-v1]
                runtime:
                  type: object
                  properties:
                    port: { type: integer, minimum: 1024, maximum: 65535 }
                    healthPath: { type: string, pattern: '^/' }
                    serviceAccountName: { type: string, pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$' }
                    resources:
                      type: object
                      properties:
                        cpuRequest: { type: string }
                        memoryRequest: { type: string }
                        cpuLimit: { type: string }
                        memoryLimit: { type: string }
                permissions:
                  type: array
                  items: { type: string }
                api:
                  type: object
                  properties:
                    basePath: { type: string }  # 셸 프록시가 허용할 prefix
                # cli:contribute(2026-07-06) — headless binding: os CLI가 registry에서 이 namespace를
                #   발견해 <apiBase><manifestPath>의 command manifest로 동적 디스패치(os <namespace> <verb>).
                #   signed manifest가 아닌 CR 선언(CLIDownload 동류) — registry가 광고(console==cli).
                cli:
                  type: object
                  properties:
                    namespace: { type: string, pattern: '^[a-z][a-z0-9-]{0,30}$' }  # os <namespace> ...
                    manifestPath: { type: string }  # apiBase 상대 경로(예: /cli/manifest)
                contributions:
                  type: object
                  required: [page, navigation, api, cli, manual, search, notification, observability]
                  properties:
                    page:
                      type: object
                      required: [enabled]
                      properties:
                        enabled: { type: boolean }
                        reason: { type: string }
                    navigation:
                      type: object
                      required: [enabled, mode]
                      properties:
                        enabled: { type: boolean }
                        mode: { type: string, enum: [runtime, install-time, none] }
                        reason: { type: string }
                    api:
                      type: object
                      required: [enabled]
                      properties:
                        enabled: { type: boolean }
                        basePath: { type: string }
                        reason: { type: string }
                    cli:
                      type: object
                      required: [enabled]
                      properties:
                        enabled: { type: boolean }
                        namespace: { type: string }
                        manifestPath: { type: string }
                        reason: { type: string }
                    manual:
                      type: object
                      required: [enabled]
                      properties:
                        enabled: { type: boolean }
                        sourceId: { type: string }
                        mode: { type: string, enum: [install-time, runtime, none] }
                        reason: { type: string }
                    search:
                      type: object
                      required: [enabled, mode]
                      properties:
                        enabled: { type: boolean }
                        mode: { type: string, enum: [runtime, index, none] }
                        reason: { type: string }
                    notification:
                      type: object
                      required: [enabled, frontend, backend]
                      properties:
                        enabled: { type: boolean }
                        frontend: { type: boolean }
                        backend: { type: boolean }
                        reason: { type: string }
                    observability:
                      type: object
                      required: [enabled, logs, metrics, traces]
                      properties:
                        enabled: { type: boolean }
                        logs: { type: boolean }
                        metrics: { type: boolean }
                        traces: { type: boolean }
                        reason: { type: string }
      additionalPrinterColumns:
        - { name: Display, type: string, jsonPath: .spec.displayName }
        - { name: Version, type: string, jsonPath: .spec.version }
        - { name: Owner, type: string, jsonPath: .spec.owner }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: uipluginregistrations.plugins.opensphere.io
spec:
  group: plugins.opensphere.io
  scope: Namespaced
  names:
    kind: UIPluginRegistration
    plural: uipluginregistrations
    singular: uipluginregistration
    shortNames: [uireg]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: { status: {} }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [packageRef, desiredState]
              properties:
                packageRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    version: { type: string }
                desiredState:
                  type: string
                  enum: [Installed, Enabled, Disabled, Uninstalled]
                installPolicy:
                  type: object
                  properties:
                    createWorkload: { type: boolean }
                    createProxyRoute: { type: boolean }
                    exposeInNavigation: { type: boolean }
                approval:
                  type: object
                  properties:
                    requestedBy: { type: string }
                    reason: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                # 감사 시정 S5(2026-07-06): 스키마를 컨트롤러 실사용으로 축소(문서·스키마·코드 3자 일치).
                # 구 주석의 Available/Verifying/Installed/Removed는 미사용 데드값이라 제거 —
                # Uninstalled는 Registration CR 자체가 삭제되므로 상태로 남지 않는다.
                phase:
                  type: string
                  enum: [Declared, DependencyPending, Installing, Verifying, Ready, Activated, Degraded, Disabled, Uninstalling, Removed, Failed]
                observedGeneration: { type: integer, format: int64 }
                retryable: { type: boolean }
                nextRetryAt: { type: string }
                observedVersion: { type: string }
                # Controller가 마지막 두 개의 검증된 release 좌표를 보존한다.
                # /rollback은 이 값으로 Package를 원자적으로 이전 digest/manifest/version에 되돌린다.
                currentDigest: { type: string, pattern: '^(|sha256:[a-f0-9]{64})$' }
                currentManifestSha256: { type: string, pattern: '^(|[a-f0-9]{64})$' }
                currentVersion: { type: string }
                previousDigest: { type: string, pattern: '^(|sha256:[a-f0-9]{64})$' }
                previousManifestSha256: { type: string, pattern: '^(|[a-f0-9]{64})$' }
                previousVersion: { type: string }
                host:
                  type: object
                  properties:
                    ref: { type: string }
                    observedApiVersion: { type: string }
                    phase: { type: string, enum: [Compatible, DependencyPending, Incompatible] }
                workload:
                  type: object
                  properties:
                    phase: { type: string, enum: [Pending, Ready, Degraded, Removed] }
                verification:
                  type: object
                  properties:
                    manifest: { type: string, enum: [Pending, Verified, Failed] }
                    signature: { type: string, enum: [Pending, Verified, Failed] }
                    entryDigest: { type: string, enum: [Pending, Verified, Failed] }
                    permissions: { type: string, enum: [Pending, Approved, Failed] }
                integrations:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      phase: { type: string, enum: [DependencyPending, Ready, Degraded, Disabled, Failed] }
                      reason: { type: string }
                      message: { type: string }
                      retryable: { type: boolean }
                      lastTransitionTime: { type: string }
                      nextRetryAt: { type: string }
                      observedVersion: { type: string }
                # reason: InvalidDigest(S1)/DigestMismatch/UntrustedKey/SignatureInvalid/SignatureUnreachable/
                #   ManifestUnreachable/ShellCompatDrift/EntryDigestMismatch/EntryUnreachable/
                #   WorkloadNotReady/PackageNotFound/InvalidPluginName (실패 시에만; 성공 상태는 빈 문자열)
                reason: { type: string }
                manifestUrl: { type: string }
                lastTransitionTime: { type: string }
      additionalPrinterColumns:
        - { name: Desired, type: string, jsonPath: .spec.desiredState }
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Reason, type: string, jsonPath: .status.reason }
