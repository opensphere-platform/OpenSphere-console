# Platform Admin IdP — 전용 Keycloak 스택 (통합안 §3·§4.1·§4.6)
# - reconcile 루프 밖 부트스트랩 자산. 워크포스 Keycloak과 인스턴스·수명주기 분리.
# - 시크릿(keycloak-bootstrap, keycloak-db)은 git에 없음 — 배포 시 생성 (README 참조).
# - 이미지 태그는 배포 후 실측 digest를 work log에 기록한다 (핀 규약).
---
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-auth
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-db-data
  namespace: opensphere-auth
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  namespace: opensphere-auth
  labels: { app: keycloak-db }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: keycloak-db }
  template:
    metadata:
      labels: { app: keycloak-db }
    spec:
      containers:
        - name: postgresql
          image: docker.io/bitnami/postgresql:latest
          env:
            - name: POSTGRESQL_DATABASE
              value: keycloak
            - name: POSTGRESQL_USERNAME
              value: keycloak
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef: { name: keycloak-db, key: password }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U keycloak -d keycloak"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: keycloak-db-data }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  namespace: opensphere-auth
spec:
  selector: { app: keycloak-db }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: opensphere-auth
  labels: { app: keycloak }
spec:
  replicas: 1
  selector:
    matchLabels: { app: keycloak }
  template:
    metadata:
      labels: { app: keycloak }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:latest
          args: ["start", "--import-realm"]
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            # 브라우저용 프런트 URL (LoadBalancer localhost:8081).
            - name: KC_HOSTNAME
              value: "http://localhost:8081"
            # 파드 내부(백채널) 요청은 요청 호스트 기준 URL을 받게 한다 —
            # RHDH 백엔드가 클러스터 DNS로 token endpoint에 접근 가능.
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://keycloak-db.opensphere-auth.svc.cluster.local:5432/keycloak
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: keycloak-db, key: password }
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef: { name: keycloak-bootstrap, key: username }
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: keycloak-bootstrap, key: password }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: mgmt, containerPort: 9000 }
          startupProbe:
            httpGet: { path: /health/started, port: 9000 }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /health/ready, port: 9000 }
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 768Mi }
            limits: { cpu: "1", memory: 1536Mi }
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-import
          configMap: { name: keycloak-realm-import }
---
# 클러스터 내부용 (RHDH 백엔드 → metadata/token)
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: opensphere-auth
spec:
  selector: { app: keycloak }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# 브라우저용 (docker-desktop LoadBalancer → localhost:8081)
apiVersion: v1
kind: Service
metadata:
  name: keycloak-ext
  namespace: opensphere-auth
spec:
  type: LoadBalancer
  selector: { app: keycloak }
  ports:
    - name: http
      port: 8081
      targetPort: 8080
