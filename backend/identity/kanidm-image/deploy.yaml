apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-console-auth
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kanidm-server-config
  namespace: opensphere-console-auth
data:
  server.toml: |
    bindaddress = "0.0.0.0:8443"
    tls_chain = "/certs/tls.crt"
    tls_key = "/certs/tls.key"
    db_path = "/data/kanidm.db"
    domain = "auth.console.opensphere.dev"
    origin = "https://auth.console.opensphere.dev"
    trust_x_forward_for = true
    role = "WriteReplica"
    log_level = "info"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kanidm
  namespace: opensphere-console-auth
  labels: { app: kanidm, app.kubernetes.io/part-of: opensphere }
spec:
  serviceName: kanidm-core
  replicas: 1
  selector:
    matchLabels: { app: kanidm }
  template:
    metadata:
      labels: { app: kanidm, app.kubernetes.io/part-of: opensphere }
    spec:
      imagePullSecrets: [{ name: opensphere-ghcr-pull }]
      containers:
        - name: kanidmd
          image: ghcr.io/opensphere-platform/opensphere-console-kanidm:edge
          imagePullPolicy: IfNotPresent
          command: ["/sbin/kanidmd", "server", "-c", "/config/server.toml"]
          ports:
            - { name: https, containerPort: 8443 }
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: tls, mountPath: /certs, readOnly: true }
            - { name: data, mountPath: /data }
          readinessProbe:
            tcpSocket: { port: 8443 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: config
          configMap: { name: kanidm-server-config }
        - name: tls
          secret: { secretName: kanidm-tls }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kanidm
  namespace: opensphere-console-auth
spec:
  selector: { app: kanidm }
  ports:
    - { name: https, port: 8443, targetPort: 8443 }
---
apiVersion: v1
kind: Service
metadata:
  name: kanidm-ext
  namespace: opensphere-console-auth
spec:
  selector: { app: kanidm }
  ports:
    - { name: https, port: 8443, targetPort: 8443 }
