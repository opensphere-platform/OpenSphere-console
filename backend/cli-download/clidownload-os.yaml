# os CLI의 콘솔 바인딩 선언 (headless). 콘솔 "Command Line Tools" 표면이 읽어 OS별 다운로드 링크 렌더.
# 다운로드 파일명은 풀네임(opensphere-cli-*) — 명령은 os, 다운로드 아티팩트는 자가설명적(oc↔openshift-client 패턴).
apiVersion: console.opensphere.io/v1alpha1
kind: CLIDownload
metadata:
  name: os
spec:
  displayName: "os — OpenSphere CLI"
  description: "oc 등가 운영자 CLI (console==cli). PAT 로그인·registry 단일창구·get·role."
  links:
    - { os: linux,   arch: amd64, text: "Linux (amd64)",   href: /api/plugins/os-cli/opensphere-cli-linux-amd64 }
    - { os: darwin,  arch: arm64, text: "macOS (arm64)",   href: /api/plugins/os-cli/opensphere-cli-darwin-arm64 }
    - { os: windows, arch: amd64, text: "Windows (amd64)", href: /api/plugins/os-cli/opensphere-cli-windows-amd64.exe }
