# os-cli 다운로드 서빙 — 바이너리는 attachment(브라우저 다운로드 강제)+octet-stream, index.json은 JSON.
server {
    listen 8080;
    server_name _;
    root /srv;

    # 다운로드 매니페스트 — 콘솔이 fetch로 읽음(인라인 JSON)
    location = /index.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }
    # 바이너리 — 다운로드 강제(파일명은 URL 마지막 세그먼트=opensphere-cli-*)
    location / {
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "no-store" always;
    }
}
