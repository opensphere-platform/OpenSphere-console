# os-cli 서빙 컨테이너 — opensphere-system에 배치(셸 generic proxy /api/plugins/os-cli/가 도달).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-cli
  namespace: opensphere-system
  labels: { app: os-cli, opensphere.io/cli-download: os }
spec:
  replicas: 2
  selector: { matchLabels: { app: os-cli } }
  template:
    metadata:
      labels: { app: os-cli }
    spec:
      containers:
        - name: serve
          image: os-cli@sha256:d661faaa535042b38e61104e8a7906c8b4602c0f4571b71bf69dd8ebb05f85d9
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /index.json, port: 8080 }, initialDelaySeconds: 2 }
          livenessProbe: { httpGet: { path: /index.json, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: os-cli
  namespace: opensphere-system
  labels: { app: os-cli }
spec:
  selector: { app: os-cli }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
