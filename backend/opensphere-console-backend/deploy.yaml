# opensphere-console-backend — 콘솔 stateless API 통합(구 console-identity-api + opensphere-catalog-api).
# 셸 nginx: /api/identity·/api/catalog·/api/kubernetes → 이 단일 서비스. (issuer=opensphere-console-auth·reconcile=dupa는 분리 유지)
apiVersion: v1
kind: ServiceAccount
metadata: { name: opensphere-console-backend, namespace: opensphere-console }
---
# catalog: CRD·deployment read (cluster)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: opensphere-console-backend }
rules:
  - { apiGroups: ["apiextensions.k8s.io"], resources: ["customresourcedefinitions"], verbs: ["get", "list"] }
  - { apiGroups: ["apps"], resources: ["deployments"], verbs: ["get", "list"] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: opensphere-console-backend }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: opensphere-console-backend }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-backend, namespace: opensphere-console }
---
# identity: Kanidm SA 자격 Secret read (opensphere-console)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: opensphere-console-backend-kanidm-reader, namespace: opensphere-console }
rules:
  - { apiGroups: [""], resources: ["secrets"], resourceNames: ["opensphere-identity-kanidm"], verbs: ["get"] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: opensphere-console-backend-kanidm-reader, namespace: opensphere-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-backend-kanidm-reader }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-backend, namespace: opensphere-console }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: opensphere-console-backend, namespace: opensphere-console, labels: { app: opensphere-console-backend } }
spec:
  replicas: 2
  selector: { matchLabels: { app: opensphere-console-backend } }
  template:
    metadata: { labels: { app: opensphere-console-backend } }
    spec:
      serviceAccountName: opensphere-console-backend
      containers:
        - name: api
          # 정본(릴리스): GHCR 이미지(NAMING-STANDARD §1·§4). 로컬 kind는 로컬 태그로 override(kubectl set image / overlay, §5).
          # push 후 §6 BOM에서 ghcr.io/opensphere-platform/opensphere-console-backend@sha256:<digest>로 고정.
          image: ghcr.io/opensphere-platform/opensphere-console-backend:2.0.0-rc.1
          imagePullPolicy: IfNotPresent
          env:
            # fetch(kube API / secret read)가 kube CA 신뢰하도록
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            - { name: KANIDM_ISSUERS, value: "__OPENSPHERE_CONSOLE_URL__/oauth2/openid/opensphere-console" }
            - { name: KANIDM_JWKS_URL, value: "https://opensphere-console-auth.opensphere-console.svc:8443/oauth2/openid/opensphere-console/public_key.jwk" }
            - { name: KANIDM_CA_PATH, value: /etc/kanidm-ca/ca.crt }
            - { name: TOKEN_INTROSPECTION_URL, value: "https://opensphere-console-auth.opensphere-console.svc:8443/bff/token/introspect" }
            - { name: TOKEN_INTROSPECTION_SERVERNAME, value: kanidm.opensphere-console-auth.svc }
            - { name: DUPA_URL, value: http://opensphere-console-dupa-controller.opensphere-console.svc.cluster.local:8080 }
            # ADR-006 migration begins in dual mode. Cutover changes this to
            # "supabase" only after identity/data/object conformance passes.
            - { name: AUTH_PROVIDER, value: dual }
            - { name: SUPABASE_AUTH_ISSUER, value: "__OPENSPHERE_CONSOLE_URL__/auth/v1" }
            - { name: SUPABASE_AUTH_AUDIENCE, value: authenticated }
            - { name: SUPABASE_REST_URL, value: "http://opensphere-supabase-rest.opensphere-cbs.svc.cluster.local:3000" }
            - name: SUPABASE_JWT_SECRET
              valueFrom: { secretKeyRef: { name: opensphere-supabase-runtime, key: jwt-secret } }
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom: { secretKeyRef: { name: opensphere-supabase-runtime, key: service-role-key } }
          volumeMounts:
            - { name: kanidm-ca, mountPath: /etc/kanidm-ca, readOnly: true }
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 2, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 20m, memory: 48Mi }
            limits: { cpu: 300m, memory: 192Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: kanidm-ca
          secret:
            secretName: opensphere-console-auth-ca
            items: [{ key: ca.crt, path: ca.crt }]
---
apiVersion: v1
kind: Service
metadata: { name: opensphere-console-backend, namespace: opensphere-console, labels: { app: opensphere-console-backend } }
spec:
  selector: { app: opensphere-console-backend }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
