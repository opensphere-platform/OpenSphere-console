# opensphere-console-backend — 콘솔 stateless API 통합(구 console-identity-api + opensphere-catalog-api).
# 셸 nginx: /api/identity·/api/catalog·/api/kubernetes → 이 단일 서비스.
apiVersion: v1
kind: ServiceAccount
metadata: { name: opensphere-console-backend, namespace: opensphere-console }
---
# catalog: CRD·deployment read (cluster)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: opensphere-console-backend }
rules:
  - { apiGroups: ["apiextensions.k8s.io"], resources: ["customresourcedefinitions"], verbs: ["get", "list"] }
  - { apiGroups: ["apps"], resources: ["deployments"], verbs: ["get", "list"] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: opensphere-console-backend }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: opensphere-console-backend }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-backend, namespace: opensphere-console }
---
# Recovery evidence is a single non-secret status ConfigMap. The Backend has
# no list, watch, or write authority in this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: opensphere-console-backend-recovery-evidence, namespace: opensphere-console }
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["opensphere-platform-recovery-evidence"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: opensphere-console-backend-recovery-evidence, namespace: opensphere-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: opensphere-console-backend-recovery-evidence }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-backend, namespace: opensphere-console }
---
# identity: Console Identity API runtime (Supabase-verified tokens in canonical mode)
apiVersion: apps/v1
kind: Deployment
metadata: { name: opensphere-console-backend, namespace: opensphere-console, labels: { app: opensphere-console-backend } }
spec:
  replicas: 2
  selector: { matchLabels: { app: opensphere-console-backend } }
  template:
    metadata: { labels: { app: opensphere-console-backend } }
    spec:
      serviceAccountName: opensphere-console-backend
      containers:
        - name: api
          # 실배포 기준: 현재 검증된 로컬 런타임 이미지.
          image: opensphere-console-backend:cli-contract-v7
          imagePullPolicy: IfNotPresent
          env:
            # fetch(kube API / secret read)가 kube CA 신뢰하도록
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            # ADR-006 canonical runtime mode.
            - { name: AUTH_PROVIDER, value: supabase }
            - { name: SUPABASE_AUTH_URL, value: "http://opensphere-supabase-auth.opensphere-console-data.svc.cluster.local:9999" }
            - { name: SUPABASE_AUTH_ISSUER, value: "https://localhost:8090/auth/v1" }
            - { name: SUPABASE_AUTH_AUDIENCE, value: authenticated }
            - { name: CONSOLE_PUBLIC_URL, value: "https://localhost:8090" }
            - { name: CLI_SESSION_TTL_SEC, value: "900" }
            - { name: CLI_PAT_TTL_SEC, value: "2592000" }
            - name: CLI_JWT_SECRET
              valueFrom: { secretKeyRef: { name: opensphere-console-cli-runtime, key: jwt-secret } }
            - { name: SUPABASE_BACKEND_DB_ROLE, value: opensphere_console_backend }
            - { name: SUPABASE_REST_URL, value: "http://opensphere-supabase-rest.opensphere-console-data.svc.cluster.local:3000" }
            - { name: SUPABASE_STORAGE_URL, value: "http://opensphere-supabase-storage.opensphere-console-data.svc.cluster.local:5000" }
            # Declarative Change Authority. Values are projected only into the
            # Console Backend; browser, OAA and Gitea repository contents never
            # receive this scoped token or the webhook/reconciler credentials.
            - { name: GITEA_URL, value: "http://opensphere-gitea.opensphere-console-change.svc.cluster.local:3000" }
            - { name: GITEA_ORGANIZATION, value: opensphere }
            - { name: GITEA_REPOSITORY, value: platform-declarations }
            - { name: GITEA_DEFAULT_BRANCH, value: main }
            - { name: GITEA_RECONCILER_NAME, value: opensphere-declaration-reconciler }
            - { name: GITEA_CHANGE_REQUIRE_AAL2, value: "true" }
            - name: GITEA_TOKEN
              valueFrom: { secretKeyRef: { name: opensphere-gitea-control-plane, key: token } }
            - name: GITEA_REVIEW_TOKEN
              valueFrom: { secretKeyRef: { name: opensphere-gitea-control-plane, key: review-token } }
            - name: GITEA_WEBHOOK_SECRET
              valueFrom: { secretKeyRef: { name: opensphere-gitea-control-plane, key: webhook-secret } }
            - name: RECONCILER_RECEIPT_TOKEN
              valueFrom: { secretKeyRef: { name: opensphere-gitea-control-plane, key: reconciler-token } }
            - name: SUPABASE_JWT_SECRET
              valueFrom: { secretKeyRef: { name: opensphere-supabase-runtime, key: jwt-secret } }
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom: { secretKeyRef: { name: opensphere-supabase-runtime, key: service-role-key } }
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 2, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 20m, memory: 48Mi }
            limits: { cpu: 300m, memory: 192Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata: { name: opensphere-console-backend, namespace: opensphere-console, labels: { app: opensphere-console-backend } }
spec:
  selector: { app: opensphere-console-backend }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
