# opensphere-console-backend — Kanidm admin 자격 Secret(런타임 조회) read-only. 전용 SA만 허용한다.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: console-identity-kanidm-reader, namespace: opensphere-console }
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["opensphere-identity-kanidm"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: console-identity-kanidm-reader, namespace: opensphere-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: console-identity-kanidm-reader }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-backend, namespace: opensphere-console }

# console-backend dual-read 전환: Console 런타임은 Supabase runtime secret도 필요.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: console-identity-supabase-runtime-reader, namespace: opensphere-console }
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["opensphere-supabase-runtime"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: console-identity-supabase-runtime-reader, namespace: opensphere-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: console-identity-supabase-runtime-reader }
subjects:
  - { kind: ServiceAccount, name: opensphere-console-backend, namespace: opensphere-console }
