# Compatibility source for operators that previously applied this ConfigMap
# directly. Setup applies the identical v3 baseline from recovery-jobs.yaml.
# Do not replace it with made-up checksum or restore values: only a completed
# isolated recovery Job can promote structured evidence.
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensphere-platform-recovery-evidence
  namespace: opensphere-console
  labels:
    app.kubernetes.io/part-of: opensphere-console
    opensphere.io/authority: recovery-evidence
    opensphere.io/managed-by: gitea-change-control
data:
  recovery-evidence.json: |
    {
      "schemaVersion": "v3",
      "generatedAt": "1970-01-01T00:00:00.000Z",
      "policy": {
        "maxEvidenceAgeSeconds": 86400,
        "targetMode": "isolated-non-destructive-drill"
      },
      "backup": {
        "supabase": {
          "database": { "verified": false },
          "storage": { "verified": false }
        },
        "gitea": { "verified": false }
      },
      "restore": {
        "supabase": { "state": "AttentionRequired", "checks": [] },
        "storage": { "state": "AttentionRequired", "checks": [] },
        "gitea": { "state": "AttentionRequired", "checks": [] }
      },
      "decommission": { "approved": false, "approvedBy": "", "approvedAt": "" }
    }
