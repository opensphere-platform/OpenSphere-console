# Recovery is deliberately data-plane local. The backup Jobs run beside the
# PVC they read and write encrypted archives straight to the operator-owned
# S3 target. The Console only receives assertions, never target credentials or
# archive contents.
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-console-recovery
  labels:
    opensphere.io/layer: recovery-drill
    opensphere.io/managed-by: opensphere-setup
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensphere-platform-recovery
  namespace: opensphere-console-data
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-platform-recovery-quiesce-reader
  namespace: opensphere-console-data
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["opensphere-supabase-storage"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-platform-recovery-quiesce-reader
  namespace: opensphere-console-data
subjects:
  - kind: ServiceAccount
    name: opensphere-platform-recovery
    namespace: opensphere-console-data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-platform-recovery-quiesce-reader
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensphere-platform-recovery
  namespace: opensphere-console-change
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-platform-recovery-quiesce-reader
  namespace: opensphere-console-change
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["opensphere-gitea"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-platform-recovery-quiesce-reader
  namespace: opensphere-console-change
subjects:
  - kind: ServiceAccount
    name: opensphere-platform-recovery
    namespace: opensphere-console-change
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-platform-recovery-quiesce-reader
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensphere-platform-recovery
  namespace: opensphere-console-recovery
automountServiceAccountToken: true
---
# The evidence ConfigMap starts fail-closed. It is updated only by a completed
# backup/drill Job through the narrowly scoped Role below; a healthy workload
# is never treated as backup or restore evidence.
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensphere-platform-recovery-evidence
  namespace: opensphere-console
  labels:
    app.kubernetes.io/part-of: opensphere-console
    opensphere.io/authority: recovery-evidence
    opensphere.io/managed-by: gitea-change-control
data:
  recovery-evidence.json: |
    {
      "schemaVersion": "v3",
      "generatedAt": "1970-01-01T00:00:00.000Z",
      "policy": {
        "maxEvidenceAgeSeconds": 86400,
        "targetMode": "isolated-non-destructive-drill"
      },
      "backup": {
        "supabase": {
          "database": { "verified": false },
          "storage": { "verified": false }
        },
        "gitea": { "verified": false }
      },
      "restore": {
        "supabase": { "state": "AttentionRequired", "checks": [] },
        "storage": { "state": "AttentionRequired", "checks": [] },
        "gitea": { "state": "AttentionRequired", "checks": [] }
      },
      "decommission": { "approved": false, "approvedBy": "", "approvedAt": "" }
    }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-platform-recovery-evidence-writer
  namespace: opensphere-console
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["opensphere-platform-recovery-evidence"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-platform-recovery-data-evidence-writer
  namespace: opensphere-console
subjects:
  - kind: ServiceAccount
    name: opensphere-platform-recovery
    namespace: opensphere-console-data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-platform-recovery-evidence-writer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-platform-recovery-change-evidence-writer
  namespace: opensphere-console
subjects:
  - kind: ServiceAccount
    name: opensphere-platform-recovery
    namespace: opensphere-console-change
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-platform-recovery-evidence-writer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-platform-recovery-drill-evidence-writer
  namespace: opensphere-console
subjects:
  - kind: ServiceAccount
    name: opensphere-platform-recovery
    namespace: opensphere-console-recovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-platform-recovery-evidence-writer
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: opensphere-supabase-recovery-backup
  namespace: opensphere-console-data
  labels:
    app.kubernetes.io/part-of: opensphere-console
    opensphere.io/recovery-component: supabase
spec:
  # A human-approved Change Control action unsuspends this after the S3 target
  # Secret is distributed. This prevents a new cluster from claiming a backup
  # merely because a CronJob exists or from reading a live RWO file PVC before
  # the storage consistency policy is approved.
  suspend: true
  schedule: "17 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: opensphere-console
            opensphere.io/recovery-component: supabase
        spec:
          restartPolicy: Never
          serviceAccountName: opensphere-platform-recovery
          imagePullSecrets: [{ name: opensphere-ghcr-pull }]
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: recovery
              image: __OPENSPHERE_RECOVERY_IMAGE__
              imagePullPolicy: IfNotPresent
              env:
                - { name: RECOVERY_MODE, value: backup-supabase }
                - { name: RECOVERY_QUIESCE_DEPLOYMENT, value: opensphere-console-data/opensphere-supabase-storage }
                - { name: RECOVERY_SOURCE_REVISION, value: "__OPENSPHERE_RELEASE_REVISION__" }
                - { name: RECOVERY_EVIDENCE_NAMESPACE, value: opensphere-console }
                - { name: RECOVERY_EVIDENCE_NAME, value: opensphere-platform-recovery-evidence }
                - { name: RECOVERY_S3_ENDPOINT, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: endpoint } } }
                - { name: RECOVERY_S3_BUCKET, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: bucket } } }
                - { name: RECOVERY_S3_REGION, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: region } } }
                - { name: RECOVERY_S3_ACCESS_KEY, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: access_key } } }
                - { name: RECOVERY_S3_SECRET_KEY, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: secret_key } } }
                - { name: RECOVERY_ENCRYPTION_KEY, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: encryption_key } } }
                - { name: AWS_CA_BUNDLE, value: /run/recovery-target/ca.crt }
                - { name: SUPABASE_POSTGRES_HOST, value: opensphere-supabase-postgres.opensphere-console-data.svc.cluster.local }
                - { name: SUPABASE_POSTGRES_USER, value: supabase_admin }
                - { name: SUPABASE_POSTGRES_DATABASE, value: postgres }
                - { name: SUPABASE_POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: opensphere-supabase-secrets, key: postgres-password } } }
                - { name: SUPABASE_STORAGE_SOURCE, value: /source/storage }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: [ALL] }
              resources:
                requests: { cpu: 250m, memory: 512Mi }
                limits: { cpu: "2", memory: 2Gi }
              volumeMounts:
                - { name: storage, mountPath: /source/storage, readOnly: true }
                - { name: target, mountPath: /run/recovery-target, readOnly: true }
                - { name: work, mountPath: /work }
          volumes:
            - { name: storage, persistentVolumeClaim: { claimName: opensphere-supabase-storage-data, readOnly: true } }
            - { name: target, secret: { secretName: opensphere-platform-recovery-target, defaultMode: 288 } }
            - { name: work, emptyDir: { sizeLimit: 20Gi } }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: opensphere-gitea-recovery-backup
  namespace: opensphere-console-change
  labels:
    app.kubernetes.io/part-of: opensphere-console
    opensphere.io/recovery-component: gitea
spec:
  suspend: true
  schedule: "43 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: opensphere-console
            opensphere.io/recovery-component: gitea
        spec:
          restartPolicy: Never
          serviceAccountName: opensphere-platform-recovery
          imagePullSecrets: [{ name: opensphere-ghcr-pull }]
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: recovery
              image: __OPENSPHERE_RECOVERY_IMAGE__
              imagePullPolicy: IfNotPresent
              env:
                - { name: RECOVERY_MODE, value: backup-gitea }
                - { name: RECOVERY_QUIESCE_DEPLOYMENT, value: opensphere-console-change/opensphere-gitea }
                - { name: RECOVERY_SOURCE_REVISION, value: "__OPENSPHERE_RELEASE_REVISION__" }
                - { name: RECOVERY_EVIDENCE_NAMESPACE, value: opensphere-console }
                - { name: RECOVERY_EVIDENCE_NAME, value: opensphere-platform-recovery-evidence }
                - { name: RECOVERY_S3_ENDPOINT, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: endpoint } } }
                - { name: RECOVERY_S3_BUCKET, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: bucket } } }
                - { name: RECOVERY_S3_REGION, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: region } } }
                - { name: RECOVERY_S3_ACCESS_KEY, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: access_key } } }
                - { name: RECOVERY_S3_SECRET_KEY, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: secret_key } } }
                - { name: RECOVERY_ENCRYPTION_KEY, valueFrom: { secretKeyRef: { name: opensphere-platform-recovery-target, key: encryption_key } } }
                - { name: AWS_CA_BUNDLE, value: /run/recovery-target/ca.crt }
                - { name: GITEA_POSTGRES_HOST, value: opensphere-gitea-postgres.opensphere-console-change.svc.cluster.local }
                - { name: GITEA_POSTGRES_USER, value: gitea }
                - { name: GITEA_POSTGRES_DATABASE, value: gitea }
                - { name: GITEA_POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: opensphere-gitea-runtime, key: db-password } } }
                - { name: GITEA_DATA_SOURCE, value: /source/gitea }
                - { name: GITEA_PRIVATE_CONFIG_SOURCE, value: /source/private }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: [ALL] }
              resources:
                requests: { cpu: 250m, memory: 512Mi }
                limits: { cpu: "2", memory: 2Gi }
              volumeMounts:
                - { name: data, mountPath: /source/gitea, readOnly: true }
                - { name: private, mountPath: /source/private, readOnly: true }
                - { name: target, mountPath: /run/recovery-target, readOnly: true }
                - { name: work, mountPath: /work }
          volumes:
            - { name: data, persistentVolumeClaim: { claimName: opensphere-gitea-data, readOnly: true } }
            - name: private
              projected:
                defaultMode: 288
                sources:
                  - secret: { name: opensphere-gitea-config }
                  - secret: { name: opensphere-gitea-signing }
            - { name: target, secret: { secretName: opensphere-platform-recovery-target, defaultMode: 288 } }
            - { name: work, emptyDir: { sizeLimit: 20Gi } }
