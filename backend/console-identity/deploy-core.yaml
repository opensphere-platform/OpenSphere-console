# console-identity-api — 콘솔 관리자(Kanidm IGA) 백엔드를 **console-core 서비스**로 배포.
# ADR-UI-003 §3.2 Core≠Plugin: DUPA UIPluginPackage(확장 메커니즘) 아님 — 콘솔과 함께 배포되는 intrinsic 서비스.
# UI는 셸 네이티브(ConsoleAdmins 컴포넌트), 셸 nginx가 /api/identity → 이 서비스 프록시.
# 이미지 v2 = 백엔드(server.js) + 현재 Kanidm CA 베이크. SA=default(kanidm-reader Role로 시크릿 read).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-identity-api
  namespace: opensphere-system
  labels:
    app: console-identity-api
    opensphere.io/scope: console-core
spec:
  replicas: 1
  selector:
    matchLabels: { app: console-identity-api }
  template:
    metadata:
      labels: { app: console-identity-api }
    spec:
      serviceAccountName: default
      containers:
        - name: api
          image: localhost:5000/console-identity:v2
          env:
            # undici fetch가 K8s API(시크릿 read) 호출 시 cluster CA 신뢰 — 원본 컨트롤러 주입과 동일.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: console-identity-api
  namespace: opensphere-system
  labels: { app: console-identity-api }
spec:
  selector: { app: console-identity-api }
  ports:
    - port: 8080
      targetPort: 8080
