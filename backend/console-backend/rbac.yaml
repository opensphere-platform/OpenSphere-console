# console-backend — Kanidm admin 자격 Secret(런타임 조회) read-only. 전용 SA만 허용한다.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: console-identity-kanidm-reader, namespace: opensphere-system }
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["opensphere-identity-kanidm"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: console-identity-kanidm-reader, namespace: opensphere-system }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: console-identity-kanidm-reader }
subjects:
  - { kind: ServiceAccount, name: console-backend, namespace: opensphere-system }
