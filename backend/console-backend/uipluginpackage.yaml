# console-identity — Kanidm 콘솔관리자 인증. ⚠️ perspective 아님.
# nav.band 'Console Admin'은 os-shell의 워크스페이스 밴드(운영/구축/전달/지능)에 없으므로 perspective nav에 안 뜬다.
# Main Shell 헤더의 '콘솔 관리자' 링크 + 클린 라우트 /console-admins(=PluginHost data.pluginId)로 진입.
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: console-identity
  namespace: opensphere-system
  labels:
    opensphere.io/scope: main-shell-admin
spec:
  displayName: "콘솔 관리자 (Kanidm)"
  owner: platform-admin
  version: 0.1.0
  description: "OpenSphere Console 운영관리자 인증 — Kanidm IGA (Main Shell 관리 영역, perspective 아님)"
  image:
    repository: localhost:5000/console-identity
    digest: v1
  nav:
    band: "Console Admin"
    label: "콘솔 관리자 (Kanidm)"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "2420be23c87f0bef630833bcecf01087806e45bc728a08d985b8b573f6c3492d"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v1
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - page:register
    - api:proxy
  api:
    basePath: /api/plugins/console-identity
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: console-identity
  namespace: opensphere-system
spec:
  packageRef:
    name: console-identity
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: false
    exposeInNavigation: true
  approval:
    requestedBy: cmars
    reason: "Kanidm console-admin auth relocated into Main Shell admin area (not a perspective)"
